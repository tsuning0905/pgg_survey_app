/* ---------- ID ENTRY (start a new survey) ---------- */
function renderIdEntry(app){
  const s=STATE.setup;
  const ng=numGroups(s), mpg=membersPerGroup(s);
  let gOpts='<option value="">— group —</option>';
  for(let g=1;g<=ng;g++) gOpts+=`<option value="${g}">${pad2(g)} — ${GROUP_COLORS[g-1]||('Group '+g)}</option>`;
  let mOpts='<option value="">— member —</option>';
  for(let m=1;m<=mpg;m++) mOpts+=`<option value="${m}">${pad2(m)}</option>`;
  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">\u2190</button><span class="title">New Survey</span></div>
    <div class="content center">
      <h2>Participant ID</h2>
      <p class="muted">Pick this respondent\u2019s group colour and member number from the whiteboard. The ID (GG_MM) is shared by the experiment ID, Q7, and the household survey ID.</p>
      <div class="field"><label>Group (colour)</label><select id="sgrp">${gOpts}</select></div>
      <div class="field"><label>Member number</label><select id="smem">${mOpts}</select></div>
      <div style="font-size:28px;font-weight:700;margin:6px 0;">ID: <span id="idprev">\u2014</span></div>
      <div class="qerr" id="err"></div>
      <button class="btn primary" id="start" style="max-width:280px;">Start survey</button>
    </div>`;
  const grp=document.getElementById('sgrp'), mem=document.getElementById('smem'), prev=document.getElementById('idprev');
  const upd=()=>{ prev.textContent=(grp.value&&mem.value)?makeId(Number(grp.value),Number(mem.value)):'\u2014'; };
  grp.onchange=upd; mem.onchange=upd;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('start').onclick=()=>{
    const err=document.getElementById('err');
    if(!grp.value||!mem.value){ err.textContent='Select both group and member.'; return; }
    const id=makeId(Number(grp.value),Number(mem.value));
    if((STATE.surveys||[]).some(s=>String(s.id)===id)){ err.textContent='A survey for ID '+id+' already exists. Open it from Home to edit.'; return; }
    const ans=blankAnswers(); ans.Q7=id;
    STATE.draft={ id:id, answers:ans, lastSection:1 };
    STATE.editIndex=null;
    saveState(); go('section',{section:1});
  };
}

/* =============================================================================
   SECTION SCREEN
============================================================================= */
function renderSection(app){
  const secNum=routeArgs.section||1;
  const sec=SECTIONS.find(s=>s.n===secNum);
  const ans=draftAnswers();
  if(!ans){ go('home'); return; }
  STATE.draft.lastSection=secNum; saveState();

  let body='';
  if(sec.note) body+=`<div class="note"><span class="flag">\u2691 Facilitator:</span> ${escapeHtml(sec.note)}</div>`;
  if(sec.instruction) body+=`<div class="note">${escapeHtml(sec.instruction)}</div>`;
  if(sec.story) body+=`<div class="story">${escapeHtml(sec.story)}</div>`;

  sec.ids.forEach(id=>{ body+=renderQuestion(id, ans); });

  const pct=Math.round(secNum/SECTIONS.length*100);
  app.innerHTML=`
    <div class="header">
      <button class="home-btn" id="home">\u2302</button>
      <span class="title">${secNum}. ${escapeHtml(sec.title)}<div class="step">ID ${escapeHtml(STATE.draft.id)} \u00b7 Section ${secNum} of ${SECTIONS.length}</div></span>
    </div>
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="content" id="qbody">${body}
      <div class="sticky-foot">
        <div class="btn-row">
          <button class="btn outline" id="prev">${secNum===1?'\u2302 Home':'\u2190 Back'}</button>
          <button class="btn primary" id="next">${secNum===SECTIONS.length?'Review \u2192':'Next \u2192'}</button>
        </div>
      </div>
    </div>`;

  wireQuestions(sec, ans);
  document.getElementById('home').onclick=()=>{ saveState(); go('home'); };
  document.getElementById('prev').onclick=()=>{ saveState(); if(secNum===1) go('home'); else go('section',{section:secNum-1}); };
  document.getElementById('next').onclick=()=>{
    saveState();
    const hard=showSectionIssues(secNum);
    const missing=missingRequired(secNum, ans);
    missing.forEach(id=>{
      const card=document.getElementById('card-'+id);
      const err=document.getElementById('err-'+id);
      if(card) card.classList.add('invalid');
      if(err && !err.textContent) err.textContent='\u26A0 Please answer this (or tap Refused / Don\u2019t know / N/A).';
    });
    if(hard.length || missing.length){
      showToast('Please answer every question on this page first');
      const firstId = missing.length ? missing[0] : hard[0].q;
      const first=document.getElementById('card-'+firstId);
      if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    if(secNum===SECTIONS.length) go('review'); else go('section',{section:secNum+1});
  };
}

/* Validate the whole draft but surface only the CURRENT section's HARD errors
   inline (red card + message). Returns the array of hard issues for this section. */
function showSectionIssues(secNum){
  const ans=draftAnswers(); if(!ans) return [];
  const r=validateSurvey(ans, STATE.setup);
  document.querySelectorAll('.qcard.invalid').forEach(c=>c.classList.remove('invalid'));
  document.querySelectorAll('.qerr').forEach(e=>{ if(e.id&&e.id.indexOf('err-')===0) e.textContent=''; });
  const hard=r.hard.filter(i=>i.sec===secNum);
  hard.forEach(i=>{
    const card=document.getElementById('card-'+i.q);
    const err=document.getElementById('err-'+i.q);
    if(card) card.classList.add('invalid');
    if(err) err.textContent='\u26A0 '+i.msg;
  });
  return hard;
}

/* ---------- render one question ---------- */
function renderQuestion(id, ans){
  const def=Q[id]; const a=ans[id];
  let inner='';
  const choice = (a&&typeof a==='object')?a.choice:a;

  if(def.groupHeader) inner+=`<div class="subhead">${escapeHtml(def.groupHeader)}</div>`;

  inner+=`<div class="qcard" id="card-${id}">`;
  inner+=`<span class="qnum">${id}</span>`;
  if(def.t==='statement5'){
    inner+=`<div class="qtext"><b>Statement 1:</b> ${escapeHtml(def.s1)}</div>`;
  } else {
    inner+=`<div class="qtext">${escapeHtml(def.text)}${def.optional?' <span class="muted">(optional)</span>':''}</div>`;
  }

  switch(def.t){
    case 'freq': case 'single': case 'statement5': case 'prizeAB': {
      inner+='<div class="opts">';
      def.opts.forEach(o=>{
        const sel = choice===o;
        inner+=`<div class="opt single ${sel?'selected':''}" data-q="${id}" data-val="${escapeHtml(o)}"><span class="mark">${sel?'\u25CF':''}</span><span>${escapeHtml(o)}</span></div>`;
      });
      inner+='</div>';
      if(def.t==='statement5') inner+=`<div class="qtext" style="margin-top:8px;"><b>Statement 2:</b> ${escapeHtml(def.s2)}</div>`;
      if(def.other && choice==='Other') inner+=`<div class="field"><input class="txt" data-q="${id}" data-other="1" placeholder="Please specify" value="${escapeHtml(a.other||'')}"></div>`;
      break;
    }
    case 'multi': {
      inner+='<div class="opts">';
      (def.opts).forEach(o=>{
        const sel=(a||[]).includes(o);
        inner+=`<div class="opt multi ${sel?'selected':''}" data-q="${id}" data-val="${escapeHtml(o)}"><span class="mark">${sel?'\u2713':''}</span><span>${escapeHtml(o)}</span></div>`;
      });
      inner+='</div>';
      if(def.other && (a||[]).includes('Other')){
        inner+=`<div class="field"><input class="txt" data-q="${id}" data-multiother="1" placeholder="Please specify" value="${escapeHtml(ans[id+'__o']||'')}"></div>`;
      }
      break;
    }
    case 'idself': {
      inner+=`<div class="field"><input class="num" value="${escapeHtml(ans.Q7||'')}" disabled></div><div class="qhint">Auto-filled from the participant ID (kept identical by design).</div>`;
      break;
    }
    case 'idlist': {
      const setup=STATE.setup||{};
      const selfId = ans.Q7 ? String(ans.Q7).trim() : '';
      const p = parseIdList(a);
      const ng=numGroups(setup), mpg=membersPerGroup(setup);
      const roster=setup.roster||[];
      const nameOf = cid => { const r=roster.find(x=>String(x.id).trim()===cid); return (r&&r.name)?r.name:''; };
      let chips=`<span class="chip na ${p.na?'on':''}" data-q="${id}" data-chip="NA">N/A (none)</span>`;
      if(setup.chiefAllowed!==false && (setup.chiefName||'').trim()){
        chips+=`<span class="chip chief ${p.chief?'on':''}" data-q="${id}" data-chip="CHIEF">CHIEF${setup.chiefName?(' \u00b7 '+escapeHtml(setup.chiefName)):''}</span>`;
      }
      for(let g=1; g<=ng; g++) for(let m=1; m<=mpg; m++){
        const cid=makeId(g,m); if(cid===selfId) continue;
        const on=p.ids.includes(cid); const nm=nameOf(cid);
        chips+=`<span class="chip ${on?'on':''}" data-q="${id}" data-chip="${cid}">${cid}${nm?'<span class="chip-name">'+escapeHtml(nm)+'</span>':''}</span>`;
      }
      inner+=`<div class="qhint">Tap every participant who applies. Tap again to remove. \u201CN/A\u201D = no one.</div>`;
      inner+=`<div class="chips">${chips}</div>`;
      break;
    }
    case 'number': {
      const refused = isRefusedVal(a);
      inner+=`<div class="field" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <input class="num" data-q="${id}" data-num="1" type="text" inputmode="numeric" ${def.intOnly?'pattern="[0-9]*"':''} value="${escapeHtml(refused?'':(a||''))}" ${refused?'disabled':''} style="max-width:140px;">
        <span class="muted">${escapeHtml(def.unit||'')}</span>
        ${def.optional?'':`<span class="chip skip ${refused?'on':''}" data-q="${id}" data-skip="1">Refused / DK</span>`}
      </div>
      <div class="qwarn" id="warn-${id}"></div>`;
      break;
    }
    case 'text': {
      const refused = isRefusedVal(a);
      inner+=`<div class="field" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <input class="txt" data-q="${id}" placeholder="${escapeHtml(def.placeholder||'')}" value="${escapeHtml(refused?'':(a||''))}" ${refused?'disabled':''} style="flex:1;min-width:160px;">
        ${def.optional?'':`<span class="chip skip ${refused?'on':''}" data-q="${id}" data-skip="1">Refused / DK</span>`}
      </div>`;
      break;
    }
    case 'yesno': {
      ['Yes','No'].forEach(o=>{ const sel=a===o; inner+=`<span class="yn ${sel?'on':''}" data-q="${id}" data-val="${o}" style="display:inline-block;margin:6px 8px 0 0;cursor:pointer;padding:9px 22px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;${sel?'background:#fff;color:#13343b;font-weight:700;':''}">${o}</span>`; });
      break;
    }
    case 'services': {
      inner+='<div class="opts">';
      SVC_ROWS.forEach(r=>{
        const v=a[r.key]||'';
        inner+=`<div class="svc-row"><span class="svc-label">${escapeHtml(r.label)}</span><span class="svc-btns">
          <span class="yn ${v==='Yes'?'on':''}" data-q="${id}" data-row="${r.key}" data-val="Yes">Yes</span>
          <span class="yn ${v==='No'?'on':''}" data-q="${id}" data-row="${r.key}" data-val="No">No</span></span></div>`;
      });
      inner+='</div>';
      break;
    }
    case 'amount500': {
      const priv = (ans.Q33&&ans.Q33.choice)==='Communicated privately';
      if(!priv){
        inner+=`<div class="qhint">Q33 is not \u201CCommunicated privately\u201D, so this is automatically <b>N/A</b>.</div>`;
      } else {
        inner+=`<div class="field" style="display:flex;align-items:center;gap:10px;"><input class="num" data-q="${id}" data-amount="1" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0\u2013500" value="${escapeHtml(a.na?'':(a.amount||''))}" style="max-width:140px;"><span class="muted">ZAR</span></div>`;
        const sel=a.na;
        inner+=`<div class="opt single ${sel?'selected':''}" data-q="${id}" data-na="1"><span class="mark">${sel?'\u25CF':''}</span><span>Not applicable (declines to pay)</span></div>`;
        inner+=`<div class="qhint">Type an amount, or tap \u201CNot applicable\u201D. Tapping it again (or typing) re-enables the amount.</div>`;
      }
      break;
    }
    case 'prizeAB': {
      // handled by single-branch above? No — keep here for the conditional gate.
      const amt=ans.Q34&&!ans.Q34.na&&isNum(ans.Q34.amount)&&String(ans.Q34.amount).trim()!=='';
      if(!amt){
        inner+=`<div class="qhint">Answer only after a willingness-to-pay amount is stated in Q34.</div>`;
      } else {
        inner+='<div class="opts">';
        def.opts.forEach(o=>{ const sel=choice===o; inner+=`<div class="opt single ${sel?'selected':''}" data-q="${id}" data-val="${escapeHtml(o)}"><span class="mark">${sel?'\u25CF':''}</span><span>${escapeHtml(o)}</span></div>`; });
        inner+='</div>';
      }
      break;
    }
    case 'landuse': {
      inner+='<div style="margin:4px 0 8px;">';
      ['Yes','No'].forEach(o=>{ const sel=a.own===o; inner+=`<span class="yn ${sel?'on':''}" data-q="${id}" data-own="${o}" style="display:inline-block;margin:0 8px 0 0;cursor:pointer;padding:9px 22px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;${sel?'background:#fff;color:#13343b;font-weight:700;':''}">${o}</span>`; });
      inner+='</div>';
      if(a.own==='Yes'){
        inner+='<div class="qhint">How was land access obtained?</div><div class="opts">';
        LANDUSE_METHODS.forEach(m=>{ const sel=(a.methods||[]).includes(m); inner+=`<div class="opt multi ${sel?'selected':''}" data-q="${id}" data-method="${escapeHtml(m)}"><span class="mark">${sel?'\u2713':''}</span><span>${escapeHtml(m)}</span></div>`; });
        inner+='</div>';
        if((a.methods||[]).includes('Other')) inner+=`<div class="field"><input class="txt" data-q="${id}" data-luother="1" placeholder="Please specify" value="${escapeHtml(a.other||'')}"></div>`;
      } else if(a.own==='No'){
        inner+=`<div class="qhint">No land access \u2014 method options are not applicable.</div>`;
      }
      break;
    }
    case 'livedout': {
      inner+='<div style="margin:4px 0 8px;">';
      ['Yes','No'].forEach(o=>{ const sel=a.lived===o; inner+=`<span class="yn ${sel?'on':''}" data-q="${id}" data-lived="${o}" style="display:inline-block;margin:0 8px 0 0;cursor:pointer;padding:9px 22px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;${sel?'background:#fff;color:#13343b;font-weight:700;':''}">${o}</span>`; });
      inner+='</div>';
      if(a.lived==='Yes'){
        inner+=`<div class="field"><label>Where?</label><input class="txt" data-q="${id}" data-where="1" value="${escapeHtml(a.where||'')}"></div>`;
        inner+=`<div class="field"><label>Duration</label><input class="txt" data-q="${id}" data-duration="1" value="${escapeHtml(a.duration||'')}"></div>`;
      } else if(a.lived==='No'){
        inner+=`<div class="qhint">Where / Duration not applicable.</div>`;
      }
      break;
    }
  }
  inner+=`<div class="qerr" id="err-${id}"></div>`;
  inner+=`</div>`;
  return inner;
}

/* ---------- wire events for a section (delegation) ---------- */
function wireQuestions(sec, ans){
  const body=document.getElementById('qbody');
  // these triggers change conditional visibility => re-render the section
  const VISIBILITY_TRIGGERS = ['Q33','Q56'];

  body.querySelectorAll('.opt, .yn').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.q; if(!id) return;
      const def=Q[id]; const a=ans[id];

      // amount500 "Not applicable"
      if(el.dataset.na){ a.na=!a.na; if(a.na) a.amount=''; saveState(); rerenderSection(sec,ans); return; }

      // services grid
      if(el.dataset.row){ a[el.dataset.row]=el.dataset.val; saveState(); rerenderSection(sec,ans); return; }

      // land-use own
      if(el.dataset.own!==undefined && el.dataset.own!==''){ a.own=el.dataset.own; if(a.own!=='Yes'){a.methods=[];a.other='';} saveState(); rerenderSection(sec,ans); return; }
      // land-use method multi
      if(el.dataset.method){ const m=el.dataset.method; const i=a.methods.indexOf(m); if(i>=0)a.methods.splice(i,1); else a.methods.push(m); if(m==='Other'&&i>=0)a.other=''; saveState(); rerenderSection(sec,ans); return; }

      // lived-out yes/no
      if(el.dataset.lived!==undefined && el.dataset.lived!==''){ a.lived=el.dataset.lived; if(a.lived!=='Yes'){a.where='';a.duration='';} saveState(); rerenderSection(sec,ans); return; }

      // simple yes/no (Q53)
      if(def.t==='yesno' && el.dataset.val){ ans[id]=el.dataset.val; saveState(); rerenderSection(sec,ans); return; }

      // multi-select (Q5)
      if(def.t==='multi'){
        const o=el.dataset.val; const arr=ans[id]; const idx=arr.indexOf(o);
        if(idx>=0){ arr.splice(idx,1); }
        else {
          const excl=def.exclusive||[];
          if(excl.includes(o)){ ans[id]=[o]; }                 // exclusive clears others
          else { def.exclusive&&def.exclusive.forEach(e=>{ const j=arr.indexOf(e); if(j>=0)arr.splice(j,1); }); arr.push(o); }
        }
        saveState();
        // toggle classes in place (no visibility change)
        body.querySelectorAll(`.opt[data-q="${id}"]`).forEach(o2=>{
          const on=(ans[id]||[]).includes(o2.dataset.val);
          o2.classList.toggle('selected',on); o2.querySelector('.mark').textContent=on?'\u2713':'';
        });
        return;
      }

      // single-select family
      if(['freq','single','statement5','prizeAB'].includes(def.t)){
        const o=el.dataset.val;
        const obj=(typeof a==='object')?a:(ans[id]={choice:'',other:''});
        obj.choice = (obj.choice===o)?'':o;       // tap again to clear
        if(def.other && obj.choice!=='Other') obj.other='';
        saveState();
        if(VISIBILITY_TRIGGERS.includes(id) || def.other){ rerenderSection(sec,ans); }
        else {
          body.querySelectorAll(`.opt[data-q="${id}"]`).forEach(o2=>{
            const on=obj.choice===o2.dataset.val;
            o2.classList.toggle('selected',on); o2.querySelector('.mark').textContent=on?'\u25CF':'';
          });
        }
        return;
      }
    };
  });

  // ----- idlist tap-chips (Q8–Q15): build the stored string from taps -----
  body.querySelectorAll('.chip[data-chip]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.q, chip=el.dataset.chip;
      const cur=parseIdList(ans[id]);
      if(chip==='NA'){
        ans[id] = cur.na ? '' : 'N/A';
      } else if(chip==='CHIEF'){
        ans[id] = buildIdList(cur.ids, !cur.chief);
      } else {
        const arr=cur.ids.slice(); const i=arr.indexOf(chip);
        if(i>=0) arr.splice(i,1); else arr.push(chip);
        ans[id] = buildIdList(arr, cur.chief);
      }
      saveState();
      const np=parseIdList(ans[id]);
      body.querySelectorAll(`.chip[data-q="${id}"][data-chip]`).forEach(c=>{
        const ch=c.dataset.chip;
        const on = ch==='NA' ? np.na : (ch==='CHIEF' ? np.chief : np.ids.includes(ch));
        c.classList.toggle('on',on);
      });
      const card=document.getElementById('card-'+id); if(card) card.classList.remove('invalid');
      const err=document.getElementById('err-'+id); if(err) err.textContent='';
    };
  });

  // ----- Refused / Don't know skip toggle for number & text fields -----
  body.querySelectorAll('.chip[data-skip]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.q;
      ans[id] = isRefusedVal(ans[id]) ? '' : 'Refused';
      saveState(); rerenderSection(sec,ans);
    };
  });

  // text / number inputs (no section re-render, so focus is kept while typing)
  body.querySelectorAll('input[data-q]').forEach(el=>{
    if(el.disabled) return;
    const id=el.dataset.q; const def=Q[id]; const a=ans[id];
    el.oninput=()=>{
      if(el.dataset.amount){
        let v=el.value.replace(/[^0-9]/g,''); if(v!==el.value) el.value=v;
        a.amount=v; if(v!=='') a.na=false;
        const na=body.querySelector(`.opt[data-q="${id}"][data-na]`);
        if(na && !a.na){ na.classList.remove('selected'); const mk=na.querySelector('.mark'); if(mk) mk.textContent=''; }
        saveState(); return;
      }
      if(el.dataset.num){
        let v = def.intOnly ? el.value.replace(/[^0-9]/g,'') : el.value.replace(/[^0-9.]/g,'');
        if(v!==el.value) el.value=v;
        ans[id]=v; saveState(); updateNumWarn(id, ans); return;
      }
      if(el.dataset.other){ a.other=el.value; }
      else if(el.dataset.multiother){ ans[id+'__o']=el.value; }
      else if(el.dataset.luother){ a.other=el.value; }
      else if(el.dataset.where){ a.where=el.value; }
      else if(el.dataset.duration){ a.duration=el.value; }
      else { ans[id]=el.value; }
      saveState();
    };
  });
}

/* build a network-list string from selected IDs + chief flag */
function buildIdList(ids, chief){
  const parts=ids.slice(); if(chief) parts.push('CHIEF');
  return parts.join(' ');
}
/* inline out-of-range / eligibility warning for number fields */
function updateNumWarn(id, ans){
  const def=Q[id]; const el=document.getElementById('warn-'+id); if(!el) return;
  const v=ans[id]; el.textContent='';
  if(v===''||v==null||isRefusedVal(v)) return;
  if(!isNum(v)){ el.textContent='\u26A0 Not a number.'; return; }
  const n=Number(v);
  if(def.min!=null && n<def.min){ el.textContent='\u26A0 Below the expected minimum ('+def.min+').'; return; }
  if(def.max!=null && n>def.max){ el.textContent='\u26A0 Above the expected maximum ('+def.max+') \u2014 please confirm.'; return; }
  if(id==='Q38' && n<18){ el.textContent='\u26A0 Under 18 \u2014 confirm this participant is eligible to consent.'; }
}

/* re-render whole section while preserving scroll (used after a structural change) */
function rerenderSection(sec, ans){
  const y=window.scrollY;
  renderSection(document.getElementById('app'));
  window.scrollTo(0,y);
}

/* =============================================================================
   REVIEW
============================================================================= */
function renderReview(app){
  const ans=draftAnswers(); if(!ans){ go('home'); return; }
  const {hard,soft}=validateSurvey(ans, STATE.setup);
  let body='';
  if(hard.length===0 && soft.length===0){
    body+='<div class="note">All checks passed. Ready to save.</div>';
  }
  if(hard.length){
    body+='<h3>Must fix ('+hard.length+')</h3>';
    hard.forEach(it=>{ body+=`<div class="issue hard" data-sec="${it.sec||''}"><span class="itag">${escapeHtml(it.q)}</span>${escapeHtml(it.msg)}</div>`; });
  }
  if(soft.length){
    body+='<h3>Please confirm ('+soft.length+')</h3>';
    soft.forEach(it=>{ body+=`<div class="issue soft" data-sec="${it.sec||''}"><span class="itag">${escapeHtml(it.q)}</span>${escapeHtml(it.msg)}</div>`; });
  }
  const canSaveBase = hard.length===0;
  const ackNeeded = soft.length>0;
  const s=STATE.setup;
  const ng=numGroups(s), mpg=membersPerGroup(s);
  const cur=parsePid(STATE.draft.id)||{g:'',m:''};
  let gOpts='', mOpts='';
  for(let g=1;g<=ng;g++) gOpts+=`<option value="${g}" ${cur.g===g?'selected':''}>${pad2(g)} \u2014 ${GROUP_COLORS[g-1]||('Group '+g)}</option>`;
  for(let m=1;m<=mpg;m++) mOpts+=`<option value="${m}" ${cur.m===m?'selected':''}>${pad2(m)}</option>`;
  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">\u2190</button><span class="title">Review \u2014 ID ${escapeHtml(STATE.draft.id)}</span></div>
    <div class="content">
      ${body}
      <div class="qcard"><div class="qtext"><b>Participant ID</b> \u2014 correct it here if it was entered wrong (no need to delete the survey).</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select id="eid-g" style="max-width:150px;">${gOpts}</select>
          <select id="eid-m" style="max-width:90px;">${mOpts}</select>
          <button class="btn" id="eid-save" style="width:auto;margin:0;padding:11px 16px;font-size:15px;">Update ID</button>
        </div>
        <div class="qerr" id="eid-err"></div>
      </div>
      ${ ackNeeded ? `<div class="ack-row"><input type="checkbox" id="ack"><label for="ack">I have reviewed the soft flags above with the participant and confirm the answers are correct.</label></div>`:'' }
      <div class="field"><label>Session completed by (name)</label><input class="txt" id="cby" value="${escapeHtml((STATE.draft.completedBy)||STATE.setup.facilitatorName||'')}"></div>
      <button class="btn primary" id="save" ${canSaveBase?'':'disabled'}>Save survey</button>
      <button class="btn outline" id="edit">\u2190 Back to questions</button>
    </div>`;
  document.getElementById('back').onclick=()=>go('section',{section:SECTIONS.length});
  document.getElementById('edit').onclick=()=>go('section',{section:SECTIONS.length});
  app.querySelectorAll('.issue[data-sec]').forEach(el=>{ const sn=el.dataset.sec; if(sn) el.onclick=()=>go('section',{section:Number(sn)}); });

  document.getElementById('eid-save').onclick=()=>{
    const eerr=document.getElementById('eid-err');
    const g=Number(document.getElementById('eid-g').value), m=Number(document.getElementById('eid-m').value);
    if(!validPid(g,m,STATE.setup)){ eerr.textContent='Pick a valid group and member.'; return; }
    const newId=makeId(g,m);
    if(newId===STATE.draft.id){ eerr.textContent='That is already the current ID.'; return; }
    const clash=(STATE.surveys||[]).some((sv,i)=>String(sv.id)===newId && i!==STATE.editIndex);
    if(clash){ eerr.textContent='A survey for ID '+newId+' already exists. Pick a different ID.'; return; }
    STATE.draft.id=newId; STATE.draft.answers.Q7=newId; saveState();
    showToast('ID changed to '+newId); go('review');
  };

  const saveBtn=document.getElementById('save');
  const ack=document.getElementById('ack');
  function refresh(){ saveBtn.disabled = !canSaveBase || (ackNeeded && !ack.checked); }
  if(ack) ack.onchange=refresh;
  refresh();
  saveBtn.onclick=()=>{
    if(saveBtn.disabled) return;
    const completedBy=document.getElementById('cby').value.trim();
    const prev=(STATE.editIndex!=null)?STATE.surveys[STATE.editIndex]:null;
    const rec={ id:STATE.draft.id, answers:ans, completedBy, savedAt:new Date().toISOString(),
                run:(prev&&prev.run!=null)?prev.run:STATE.setup.run,
                village:(prev&&prev.village!=null)?prev.village:STATE.setup.villageNumber };
    if(STATE.editIndex!=null){ STATE.surveys[STATE.editIndex]=rec; }
    else { STATE.surveys.push(rec); }
    STATE.draft=null; STATE.editIndex=null; saveState();
    showToast('Survey saved'); go('home');
  };
}

/* =============================================================================
   VIEW / EDIT / DELETE a saved survey
============================================================================= */
function renderViewSurvey(app){
  const sv=STATE.surveys[routeArgs.index];
  if(!sv){ go('home'); return; }
  const ans=sv.answers;
  let rows='';
  ALL_IDS.forEach(id=>{ rows+=`<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.12);"><b>${id}</b> \u00b7 ${escapeHtml(answerSummary(id,ans))}</div>`; });
  const {hard,soft}=validateSurvey(ans, STATE.setup);
  const status = hard.length? `<div class="note" style="border-color:#ff9999;">${hard.length} hard issue(s) remain.</div>` : (soft.length?`<div class="note">${soft.length} soft flag(s).</div>`:'<div class="note">All checks passed.</div>');
  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">\u2190</button><span class="title">ID ${escapeHtml(sv.id)}${sv.answers.Q36?' \u00b7 '+escapeHtml(sv.answers.Q36):''}</span></div>
    <div class="content">
      ${status}
      <div class="btn-row"><button class="btn primary" id="edit">Edit</button><button class="btn danger" id="del">Delete</button></div>
      <div style="font-size:14px;margin-top:8px;">${rows}</div>
      <button class="btn outline" id="back2">\u2190 Home</button>
    </div>`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('back2').onclick=()=>go('home');
  document.getElementById('edit').onclick=()=>{
    STATE.draft={ id:sv.id, answers:JSON.parse(JSON.stringify(sv.answers)), lastSection:1, completedBy:sv.completedBy };
    STATE.editIndex=routeArgs.index; saveState(); go('section',{section:1});
  };
  document.getElementById('del').onclick=()=>{
    if(confirm('Delete the survey for ID '+sv.id+'? This cannot be undone.')){
      STATE.surveys.splice(routeArgs.index,1); saveState(); showToast('Deleted'); go('home');
    }
  };
}
function answerSummary(id,ans){
  const def=Q[id]; const a=ans[id];
  switch(def.t){
    case 'multi': { const base=(a&&a.length)?a.join('; '):'\u2014'; const o=ans[id+'__o']; return (def.other&&a&&a.includes('Other')&&o)?(base+' ('+o+')'):base; }
    case 'services': return SVC_ROWS.map(r=>r.label.split(' ')[0]+':'+(a[r.key]||'\u2014')).join('  ');
    case 'amount500': return a.na?'N/A':(a.amount!==''?a.amount+' ZAR':'\u2014');
    case 'landuse': return a.own?(a.own+(a.own==='Yes'?(' \u2014 '+((a.methods||[]).join('; ')||'no method')+(a.other?(' ('+a.other+')'):'')):'')):'\u2014';
    case 'livedout': return a.lived?(a.lived+(a.lived==='Yes'?(' \u2014 '+(a.where||'?')+' / '+(a.duration||'?')):'')):'\u2014';
    case 'idself': return ans.Q7||'\u2014';
    case 'single': case 'statement5': case 'prizeAB':
      return (a.choice||'\u2014')+((def.other&&a.choice==='Other'&&a.other)?(': '+a.other):'');
    default: return (a==='' || a==null)?'\u2014':String(a);
  }
}

/* =============================================================================
   EXPORT CSV
============================================================================= */
function csvCell(v){ if(v==null) return ''; const s=String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function buildCSV(){
  const s=STATE.setup;
  const meta=['village_number','run','village_name','village_type','ward_tc','date','facilitator','completed_by','participant_id','colour_member','saved_at'];
  const cols=[];
  ALL_IDS.forEach(id=>{
    const def=Q[id];
    if(def.t==='services'){ SVC_ROWS.forEach(r=>cols.push(id+'_'+r.key)); }
    else if(def.t==='amount500'){ cols.push(id+'_amount'); cols.push(id+'_na'); }
    else if(def.t==='landuse'){ cols.push(id+'_own'); cols.push(id+'_methods'); cols.push(id+'_other'); }
    else if(def.t==='livedout'){ cols.push(id+'_lived'); cols.push(id+'_where'); cols.push(id+'_duration'); }
    else if(def.t==='multi' && def.other){ cols.push(id); cols.push(id+'_other'); }
    else if((def.t==='single'||def.t==='statement5'||def.t==='prizeAB')&&def.other){ cols.push(id); cols.push(id+'_other'); }
    else cols.push(id);
  });
  const header=meta.concat(cols).join(',');
  const lines=[header];
  (STATE.surveys||[]).slice().sort((a,b)=>idOrder(a.id)-idOrder(b.id)).forEach(sv=>{
    const a=sv.answers;
    const vlg=(sv.village!=null)?sv.village:s.villageNumber;
    const run=(sv.run!=null)?sv.run:s.run;
    const pidFull=participantIdFull(vlg, run, sv.id);
    const row=[ vlg, run, s.villageName,s.villageType,s.wardTC,s.date,s.facilitatorName,sv.completedBy,pidFull,sv.id,sv.savedAt ];
    ALL_IDS.forEach(id=>{
      const def=Q[id]; const v=a[id];
      if(def.t==='services'){ SVC_ROWS.forEach(r=>row.push(v[r.key]||'')); }
      else if(def.t==='amount500'){ row.push(v.na?'':v.amount); row.push(v.na?'1':''); }
      else if(def.t==='landuse'){ row.push(v.own||''); row.push((v.methods||[]).join('; ')); row.push(v.other||''); }
      else if(def.t==='livedout'){ row.push(v.lived||''); row.push(v.where||''); row.push(v.duration||''); }
      else if(def.t==='multi'){ row.push((v||[]).join('; ')); if(def.other) row.push(a[id+'__o']||''); }
      else if((def.t==='single'||def.t==='statement5'||def.t==='prizeAB')){ row.push(v.choice||''); if(def.other) row.push(v.other||''); }
      else row.push(v==null?'':v);
    });
    lines.push(row.map(csvCell).join(','));
  });
  return lines.join('\n');
}
function renderExport(app){
  const csv=buildCSV();
  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">\u2190</button><span class="title">Export CSV</span></div>
    <div class="content">
      <p>${(STATE.surveys||[]).length} survey(s). One row per respondent; grids and skip-logic items expand into sub-columns.</p>
      <button class="btn primary" id="dl">\u2B07 Download CSV</button>
      <button class="btn" id="copy">\u29C9 Copy to clipboard</button>
      <div style="margin-top:12px;max-height:50vh;overflow:auto;background:rgba(0,0,0,0.25);padding:8px;border-radius:8px;font-family:monospace;font-size:11px;white-space:pre;">${escapeHtml(csv)}</div>
    </div>`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('dl').onclick=()=>{
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob); const aEl=document.createElement('a');
    aEl.href=url; aEl.download=`PGG_Survey_v${STATE.setup.villageNumber}_run${STATE.setup.run}_${STATE.setup.date}.csv`;
    document.body.appendChild(aEl); aEl.click(); setTimeout(()=>{URL.revokeObjectURL(url);aEl.remove();},1000);
  };
  document.getElementById('copy').onclick=async()=>{
    try{ await navigator.clipboard.writeText(csv); showToast('Copied'); }catch(e){ showToast('Clipboard unavailable \u2014 use Download'); }
  };
}

/* =============================================================================
   STARTUP + back-button handling
============================================================================= */
window.addEventListener('load',()=>{
  try{ history.replaceState({route,routeArgs,survey:true},'',''); }catch(e){}
  render();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
});
// Intercept hardware/browser back: within a survey, go to the previous section
// instead of leaving the app (prevents accidental data loss).
window.addEventListener('popstate',()=>{
  if(route==='section'){
    const n=routeArgs.section||1;
    if(n>1){ go('section',{section:n-1}); } else { go('home'); }
  } else if(route==='review'){ go('section',{section:SECTIONS.length}); }
  else if(route==='idEntry'||route==='exportData'||route==='settings'||route==='viewSurvey'){ go('home'); }
});
window.addEventListener('beforeunload',(e)=>{ if(STATE.draft){ e.preventDefault(); e.returnValue=''; } });
