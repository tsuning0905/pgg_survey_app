<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PGG Survey">
<title>PGG Post-Experiment Survey</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ===================== BASE ===================== */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", Roboto, sans-serif;
  /* Deep slate-teal background — deliberately different from the black game app
     so facilitators never confuse the two, but the same translucent-card UI. */
  background: #13343b;
  color: #fff;
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  height: 100%;
}
/* Inputs MUST stay selectable/editable for data entry */
input, textarea, select { -webkit-user-select: text; user-select: text; }
#app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

/* ===================== HEADER ===================== */
.header {
  display: flex; align-items: center;
  padding: 16px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  font-size: 19px; font-weight: 600;
  gap: 10px;
  position: sticky; top: 0; z-index: 10;
  background: #13343b;
}
.header .home-btn {
  background: transparent; border: none; color: inherit;
  font-size: 22px; padding: 4px 8px; cursor: pointer;
}
.header .title { flex: 1; line-height: 1.2; }
.header .step { font-size: 14px; opacity: 0.85; font-weight: 500; }

/* progress bar */
.progress { height: 4px; background: rgba(255,255,255,0.18); }
.progress > div { height: 100%; background: rgba(255,255,255,0.75); transition: width 0.2s; }

/* ===================== CONTENT ===================== */
.content { flex: 1; padding: 16px; display: flex; flex-direction: column; }
.content.center { justify-content: center; align-items: center; text-align: center; }

h2 { font-size: 22px; margin: 8px 0 12px; font-weight: 600; }
h3 { font-size: 17px; margin: 18px 0 6px; font-weight: 600; opacity: 0.95; }
p, label { font-size: 16px; line-height: 1.45; }
.big-msg { font-size: 22px; line-height: 1.5; margin: 12px 0; }

/* ===================== BUTTONS ===================== */
.btn {
  display: block; width: 100%;
  padding: 16px;
  margin: 8px 0;
  font-size: 18px;
  font-weight: 600;
  background: rgba(255,255,255,0.22);
  color: #fff;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  text-align: center;
}
.btn:active { background: rgba(255,255,255,0.35); }
.btn.primary { background: rgba(255,255,255,0.34); }
.btn.outline { background: transparent; border: 1.5px solid rgba(255,255,255,0.6); }
.btn.danger { background: transparent; border: 1.5px solid rgba(255,180,180,0.7); color: #ffdede; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-row { display: flex; gap: 12px; }
.btn-row .btn { flex: 1; }

/* ===================== INPUTS ===================== */
.field { margin: 14px 0; }
.field label { display: block; margin-bottom: 6px; font-size: 14px; opacity: 0.9; }
.field input, .field select, input.txt, input.num {
  width: 100%;
  padding: 13px;
  font-size: 17px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 14px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus, input.txt:focus, input.num:focus { border-color: #fff; }
input::placeholder { color: rgba(255,255,255,0.45); }
input:disabled { opacity: 0.4; }
select option { color: #000; }

/* ===================== QUESTION CARD ===================== */
.qcard {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 14px 14px 12px;
  margin: 12px 0;
}
.qcard .qnum {
  display: inline-block;
  font-weight: 700; font-size: 13px;
  background: rgba(255,255,255,0.25);
  padding: 2px 8px; border-radius: 999px;
  margin-bottom: 6px;
}
.qcard .qtext { font-size: 16px; line-height: 1.4; margin: 2px 0 4px; }
.qcard.invalid { border-color: rgba(255,140,140,0.9); }
.qhint { font-size: 13px; opacity: 0.75; margin: 4px 0; }
.qerr { font-size: 13px; color: #ffd0d0; margin: 6px 0 0; min-height: 0; }

/* ===================== OPTION ROWS ===================== */
.opts { margin-top: 6px; }
.opt {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px;
  margin: 6px 0;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.28);
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px; line-height: 1.3;
}
.opt:active { background: rgba(255,255,255,0.18); }
.opt .mark {
  flex: 0 0 22px; width: 22px; height: 22px;
  border: 2px solid rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.opt.single .mark { border-radius: 50%; }
.opt.multi .mark { border-radius: 6px; }
.opt.selected { background: rgba(255,255,255,0.30); border-color: #fff; }
.opt.selected .mark { background: #fff; color: #13343b; border-color: #fff; }

/* services grid */
.svc-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.12);
}
.svc-row .svc-label { flex: 1; font-size: 14px; }
.svc-row .svc-btns { display: flex; gap: 6px; }
.svc-row .yn {
  padding: 7px 14px; border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06); cursor: pointer; font-size: 14px;
}
.svc-row .yn.on { background: #fff; color: #13343b; border-color: #fff; font-weight: 700; }

/* ===================== NOTES / BANNERS ===================== */
.note {
  background: rgba(255,255,255,0.10);
  border-left: 4px solid rgba(255,255,255,0.6);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 14px; line-height: 1.5;
  margin: 12px 0;
}
.note .flag { font-weight: 700; }
.story {
  background: rgba(0,0,0,0.22);
  border-radius: 12px;
  padding: 14px;
  font-style: italic;
  font-size: 15px; line-height: 1.55;
  margin: 12px 0;
}
.warning {
  background: rgba(255,255,255,0.15);
  border-radius: 12px; padding: 14px; font-size: 14px; margin: 10px 0;
}
.subhead { font-weight: 700; font-size: 16px; margin: 16px 0 4px; }

/* ===================== TAP CHIPS (network IDs / skip pills) ===================== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 9px 13px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06);
  font-size: 15px; font-weight: 600; line-height: 1.1;
  cursor: pointer; min-width: 44px; text-align: center;
}
.chip:active { background: rgba(255,255,255,0.18); }
.chip.on { background: #fff; color: #13343b; border-color: #fff; }
.chip .chip-name { font-size: 10px; font-weight: 500; opacity: 0.75; margin-top: 2px; }
.chip.on .chip-name { opacity: 0.7; }
.chip.na { border-style: dashed; }
.chip.chief.on { background: #ffe9b3; }
.chip.skip { padding: 9px 13px; font-size: 13px; }
.chip.skip.on { background: #ffd9d9; color: #7a1f1f; border-color: #ffd9d9; }
.qwarn { font-size: 13px; color: #ffe1a8; margin: 6px 0 0; min-height: 0; }
.opt-disabled { opacity: 0.4; }

/* ===================== REVIEW ===================== */
.issue {
  border-radius: 12px; padding: 12px 14px; margin: 8px 0; font-size: 14px; line-height: 1.4;
  cursor: pointer;
}
.issue.hard { background: rgba(200,60,60,0.35); border: 1px solid rgba(255,150,150,0.6); }
.issue.soft { background: rgba(220,170,60,0.28); border: 1px solid rgba(255,210,120,0.6); }
.issue .itag { font-weight: 700; margin-right: 6px; }
.ack-row { display: flex; align-items: flex-start; gap: 10px; margin: 14px 0; font-size: 14px; }
.ack-row input { width: 22px; height: 22px; margin-top: 2px; }

/* ===================== LIST CARDS ===================== */
.list-card {
  background: rgba(255,255,255,0.14);
  border-radius: 14px;
  padding: 14px;
  margin: 8px 0;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.list-card .lc-main { flex: 1; }
.list-card .lc-id { font-weight: 700; font-size: 16px; }
.list-card .lc-sub { font-size: 13px; opacity: 0.8; }
.list-card .lc-badge { font-size: 12px; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,0.25); }

/* ===================== UTILITY ===================== */
.spacer { flex: 1; }
.muted { opacity: 0.85; }
hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.35); margin: 16px 0; }
.toast {
  position: fixed; bottom: 20px; left: 20px; right: 20px;
  background: rgba(0,0,0,0.88); color: #fff; padding: 14px; border-radius: 12px;
  text-align: center; font-size: 15px; z-index: 1000;
}
.sticky-foot {
  position: sticky; bottom: 0;
  background: #13343b;
  padding: 10px 0 4px;
  border-top: 1px solid rgba(255,255,255,0.2);
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 3px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =============================================================================
   PGG POST-EXPERIMENT SURVEY — single-file offline PWA
   Reproduces Post_Experiment_Survey_isiXhosa_EC_V2 (Q1-Q58) and enforces the
   skip / range / consistency / exclusivity validation logic.
   All data is stored in localStorage so the app works fully offline.
   UI language mirrors the sibling PGG Field App (translucent cards, dark base).
============================================================================= */

/* ---------- OPTION SETS (reused) ---------- */
const FREQ   = ["Never","Just once or twice","A few times","Often","Don't know","Refused"];
const LIKERT = ["Strongly agree","Agree","Neither agree nor disagree","Disagree","Strongly disagree","Don't know","Refused"];
const CONF   = ["Not at all confident","Slightly confident","Moderately confident","Very confident","Completely confident","Don't know","Refused"];
const SPEED  = ["Within a few days","Within a few weeks","Within a few months","Within a year","More than a year","Don't know","Refused"];
const PAYL   = ["Very unlikely","Somewhat unlikely","Neither","Somewhat likely","Very likely","Don't know","Refused"];
const LAW    = ["Only written law","Mostly written law","Equally both","Mostly customary law (umthetho wesithethe)","Only customary law","Don't know","Refused"];
const STMT5  = ["1 Agree very strongly with Statement 1","2 Agree with Statement 1","3 Agree with neither","4 Agree with Statement 2","5 Agree very strongly with Statement 2","Don't know","Refused"];

/* ---------- PARTICIPANT ID: format is GG_MM (group-colour _ member) ----------
   Group colour -> number: Red=01, Orange=02, Yellow=03, Green=04, Blue=05, Purple=06.
   Members within a group: 01..04. So Red member 1 = "01_01", Purple member 4 = "06_04". */
const GROUP_COLORS = ["Red","Orange","Yellow","Green","Blue","Purple"];
function pad2(n){ return String(n).padStart(2,'0'); }
function makeId(g,m){ return pad2(g)+'_'+pad2(m); }
/* parse a "GG_MM" token -> {g,m} or null */
function parsePid(tok){
  const mt=/^(\d{1,2})[_\-](\d{1,2})$/.exec(String(tok==null?'':tok).trim());
  return mt?{g:parseInt(mt[1],10), m:parseInt(mt[2],10)}:null;
}
function numGroups(setup){ const n=Number(setup&&setup.numGroups); return (n>=1&&n<=GROUP_COLORS.length)?n:GROUP_COLORS.length; }
function membersPerGroup(setup){ const n=Number(setup&&setup.membersPerGroup); return n>=1?n:4; }
function validPid(g,m,setup){ return Number.isInteger(g)&&Number.isInteger(m)&&g>=1&&g<=numGroups(setup)&&m>=1&&m<=membersPerGroup(setup); }
function idOrder(id){ const p=parsePid(id); return p?(p.g*1000+p.m):999999; }
/* CSV participant_id: {village}_{run}_{colour}_{member}, e.g. 01_01_05_02. twoPart is "GG_MM". */
function participantIdFull(village, run, twoPart){
  return pad2(Number(village)||0)+'_'+pad2(Number(run)||1)+'_'+String(twoPart||'');
}

/* ---------- QUESTION SCHEMA ----------
   type drives both rendering and validation.
     single   : choose exactly one (opts)
     multi    : choose any (opts), with `exclusive` options
     likert / single-with-options : single
     statement5: single with two anchor statements
     idself   : Q7, auto-filled from the survey ID (read-only)
     idlist   : free text list of participant numbers / N/A
     number   : numeric entry
     text     : free text
     services : Q51 Yes/No grid
     amount500: Q34 (amount 0-500 OR N/A, conditional on Q33)
     prizeAB  : Q35 (conditional on Q34)
     yesno    : simple Yes/No
     landuse  : Q52 (Yes/No + acquisition methods + other)
     livedout : Q55 (Yes/No + where + duration)
   `other:true` adds an "Other: ___" free-text reveal.
   `optional:true` suppresses the unanswered-flag at review.
============================================================================= */
const SVC_ROWS = [
  {key:"electricity",   label:"Electricity"},
  {key:"piped_inside",  label:"Piped water inside dwelling"},
  {key:"piped_yard",    label:"Piped water in yard"},
  {key:"communal_tap",  label:"Communal tap (standpipe)"},
  {key:"flush_inside",  label:"Flush toilet (inside)"},
  {key:"flush_outside", label:"Flush toilet (outside)"},
  {key:"pit_latrine",   label:"Pit latrine / VIP"},
  {key:"bucket",        label:"Bucket system"}
];
const LANDUSE_METHODS = [
  "Allocated by the inkosi / Traditional Council",
  "Permission to Occupy (PTO)",
  "Communal grazing — no individual allocation",
  "Registered title deed",
  "Inherited within the family",
  "Other",
  "Don't know","Refused"
];
/* Q21 (E1) — how the community is informed about use of funds/materials */
const INFORM_OPTS = [
  "Announced at an imbizo before and after the project",
  "Verbal announcement by the induna or headman",
  "Written notice posted in the village",
  "WhatsApp / community group message",
  "Committee report",
  "Not usually announced",
  "Other",
  "Don't know","Refused"
];
/* Q21b (E2) — who keeps records/receipts for a community fund */
const RECORD_OPTS = [
  "Inkosi",
  "Traditional Council treasurer",
  "Village / ward committee",
  "Ward councillor's office",
  "NGO / implementing partner",
  "No one keeps records",
  "Other",
  "Don't know","Refused"
];

const Q = {
  Q1:{t:"freq",  text:"Over the past year, how often have you attended meetings of a church group (other than regular religious services)?", opts:FREQ},
  Q2:{t:"freq",  text:"Over the past year, how often have you attended meetings of a local self-help association such as a stokvel, burial society (umbutho wangcwabo), or neighbourhood watch?", opts:FREQ},
  Q3:{t:"freq",  text:"Over the past year, how often have you attended meetings of a group concerned with local matters such as schools, housing, water, or communal land?", opts:FREQ},
  Q4:{t:"freq",  text:"Over the past year, how often have you attended meetings of a local commercial organisation such as a business group, spaza association, or farmers' association?", opts:FREQ},
  Q5:{t:"multi", text:"Over the past year, have you contacted any of the following people about important problems or to give them your views? (Select all that apply)",
      opts:["The inkosi / ikhosi","The induna or headman","A church leader / umfundisi","A community leader (not traditional)","A ward councillor","A trade union official","None of the above","Don't know","Refused"],
      exclusive:["None of the above","Don't know","Refused"]},
  Q6:{t:"single",text:"When you get together with friends or neighbours, would you say you discuss community or political matters?",
      opts:["Frequently","Occasionally","Never","Don't know","Refused"]},

  Q7:{t:"idself", text:"Your number on the whiteboard is:"},
  Q8:{t:"idlist", text:"Which participants are household members of yours — e.g. spouse, parent, child, or sibling? (Write participant numbers)"},
  Q9:{t:"idlist", text:"Which participants are relatives living in a different homestead (umzi) from yours? (Write participant numbers)"},
  Q10:{t:"idlist",text:"Which participants share your clan surname (isiduko) but are not close family? (Write participant numbers)"},
  Q11:{t:"idlist",text:"Which participants are neighbours — living in the adjacent homestead to yours? (Write participant numbers)"},
  Q12:{t:"idlist",text:"Which participants would you discuss important matters with — e.g. land, farming, finance, disputes, or imbizo decisions? (Write participant numbers)"},
  Q13:{t:"idlist",text:"Which participants would you borrow money from, lend money to, or exchange gifts with in a financial emergency? (Write participant numbers)"},
  Q14:{t:"idlist",text:"Which participants do you cooperate with in farming or business activities — e.g. sharing tools, joint herding, ilima work parties, joint trading? (Write participant numbers)"},
  Q15:{t:"idlist",text:"Which participants are izifiki — newcomers or people from outside your clan area — that you know by name? (Write participant numbers)"},

  Q16:{t:"single",text:"It is safe to openly express disagreement in this village — including at an imbizo.", opts:LIKERT},
  Q17:{t:"single",text:"Major decisions in this village are usually made through open discussion (e.g. at an imbizo).", opts:LIKERT},
  Q18:{t:"single",text:"People in the village usually follow rules and norms that have been decided together.", opts:LIKERT},
  Q19:{t:"single",text:"People in the village usually act for the collective good (ubuntu) — for example, by participating in ilima, maintaining communal water points, or contributing to shared projects.", opts:LIKERT},
  Q20:{t:"single",text:"Generally speaking, would you say that most people in this village can be trusted, or that you can't be too careful in dealing with people?",
      opts:["Most people can be trusted","Can't be too careful","Don't know","Refused"]},

  Q21:{t:"multi", other:true,
      text:"If money or materials are provided for a community purpose, how are community members usually informed about how they are used? (Select all that apply)",
      opts:INFORM_OPTS, exclusive:["Not usually announced","Don't know","Refused"]},
  Q21b:{t:"multi", other:true,
      text:"Who normally keeps records or receipts for a community fund or project? (Select all that apply)",
      opts:RECORD_OPTS, exclusive:["No one keeps records","Don't know","Refused"]},
  Q22:{t:"single",text:"Villagers are able to openly challenge the inkosi's decisions.", opts:LIKERT},
  Q23:{t:"single",text:"People who have good relationships with the inkosi or induna find it easier to access resources such as land, grants, or jobs.", opts:LIKERT},
  Q24:{t:"single",text:"Decisions about resources in this village sometimes favour particular families or clans (isiduko).", opts:LIKERT},

  Q25:{t:"single",text:"When the inkosi makes a decision, how confident are you that this decision will be fair?", opts:CONF,
      groupHeader:"(a) If they took their dispute to the village inkosi:"},
  Q26:{t:"single",text:"How quickly do you think the inkosi will make a decision?", opts:SPEED},
  Q27:{t:"single",text:"How likely is it that Sipho and Thabo will have to make payments — formal or informal — to the inkosi to settle the case?", opts:PAYL},
  Q28:{t:"single",text:"Will the inkosi rely on written South African law, on isiXhosa customary law (umthetho wesithethe), or equally on both?", opts:LAW},
  Q29:{t:"single",text:"When the Magistrate's Court makes a decision, how confident are you that this decision will be fair?", opts:CONF,
      groupHeader:"(b) If they took their dispute to the local Magistrate's Court:"},
  Q30:{t:"single",text:"How quickly do you think the Magistrate's Court will make a decision?", opts:SPEED},
  Q31:{t:"single",text:"How likely is it that Sipho and Thabo will have to make payments — formal or informal — to the Magistrate's Court to settle the case?", opts:PAYL},
  Q32:{t:"single",text:"Will the Magistrate's Court rely on written South African law, on isiXhosa customary law (umthetho wesithethe), or equally on both?", opts:LAW},

  Q33:{t:"single",text:"If you won a prize of R500 in this experiment, would you prefer the result to be announced publicly in this room, or communicated to you privately?",
      opts:["It doesn't matter to me","Announced publicly in this room","Communicated privately"]},
  Q34:{t:"amount500",text:"If you prefer to receive the result privately, what is the maximum amount you would be willing to pay to keep the result private? (Only answer if you chose 'Communicated privately' above)"},

  Q36:{t:"text",  text:"Your full name:", placeholder:"Full name"},
  Q37:{t:"single",text:"Gender:", opts:["Male","Female","Other / prefer not to say"]},
  Q38:{t:"number",text:"Age:", unit:"years", min:0, max:130, intOnly:true},
  Q39:{t:"single",text:"Marital status:", opts:["Single","Married (customary / ilobolo)","Married (civil / legal)","Widowed","Divorced / separated"]},
  Q40:{t:"single",text:"Highest level of education completed:", opts:["No formal education","Some primary (Grades 1–6)","Completed primary (Grade 7)","Some secondary (Grades 8–11)","Matric / Grade 12","Post-school certificate / diploma","University degree or above"]},
  Q41:{t:"text",  text:"Main occupation:", placeholder:"Main occupation"},
  Q42:{t:"text",  text:"Secondary occupation (if any):", placeholder:"Leave blank if none", optional:true},
  Q43:{t:"number",text:"Total number of people living in your household, including yourself:", unit:"persons", min:0, max:60, intOnly:true},
  Q44:{t:"number",text:"Number of working household members (anyone earning income, including grants):", unit:"persons", min:0, max:60, intOnly:true},

  Q45:{t:"single",other:true,text:"What is the PRIMARY source of your household's income? (Select the most important one)",
      opts:["Farming / livestock","Wage employment (formal job)","Casual / piece work (temporary)","Self-employment / spaza / hawking","Government grants (e.g. child support grant, old-age pension, disability grant)","Remittances — money sent by family members from the city or at the mines","Other"]},
  Q46:{t:"single",text:"Is your household income:", opts:["Regular and predictable","Seasonal (e.g. harvest, contract work)","Irregular","Very uncertain"]},
  Q47:{t:"single",text:"What is the approximate total monthly income of your household before expenses? (Include wages, grants, remittances, business income)",
      opts:["No income","Less than R1,000","R1,001 – R3,000","R3,001 – R6,000","R6,001 – R12,000","R12,001 – R25,000","More than R25,000","Don't know","Refused"]},
  Q48:{t:"single",other:true,text:"What is the main material of the roof of your household's dwelling?",
      opts:["Thatch / grass / traditional materials","Corrugated iron / zinc / metal sheets","Asbestos sheets","Tiles","Concrete / cement slab","Mixed materials","Other","Don't know","Refused"]},
  Q49:{t:"number",text:"Number of rooms used for sleeping:", unit:"rooms", min:0, max:40, intOnly:true},
  Q50:{t:"number",text:"Total number of rooms:", unit:"rooms", min:0, max:40, intOnly:true},
  Q51:{t:"services",text:"Which of the following services does your household have access to? (Yes or No for each)"},
  Q52:{t:"landuse",text:"Do you own or have the right to use agricultural land? If yes — how was land access obtained?"},

  Q53:{t:"yesno", text:"Were you born in this village?"},
  Q54:{t:"number",text:"How many years have you lived in this village?", unit:"years", min:0, max:130, intOnly:true},
  Q55:{t:"livedout",text:"Have you ever lived outside this village continuously for more than 6 months? (If yes: where and for how long?)"},
  Q56:{t:"single",text:"How often do you travel outside this village for any reason — work, visiting family, shopping, medical, church?",
      opts:["Never","Less than once a year","A few times a year","About once a month","A few times a month","About once a week","Several times a week","Daily"]},
  Q57:{t:"single",other:true,text:"Main reason for travel:",
      opts:["Work / employment","Business / trading","Visiting family (e.g. at the mines, Cape Town, East London)","Shopping / accessing services","School / study","Medical / clinic","Church / religious gathering","Other"]},
  Q58:{t:"text",  text:"Mobile phone number (in case the research team needs to follow up):", placeholder:"Optional", optional:true}
};

const SECTIONS = [
  {n:1, title:"Civic Participation", note:"Read: \u201CThe following questions ask about your participation in local groups. Please answer based on your own experience.\u201D", ids:["Q1","Q2","Q3","Q4","Q5","Q6"]},
  {n:2, title:"Social Network Mapping", instruction:"Every participant in this session is listed on the whiteboard by their colour-number ID (for example 01_03 = Red, member 3). The Chief is shown by name, with no number. Answer by writing the applicable participant IDs (e.g. 01_03, 02_01). To include the Chief, write CHIEF. If no one applies, write \u201CN/A\u201D.", ids:["Q7","Q8","Q9","Q10","Q11","Q12","Q13","Q14","Q15"]},
  {n:3, title:"Views of the Community", ids:["Q16","Q17","Q18","Q19","Q20"]},
  {n:4, title:"Views of Traditional Leaders", note:"Read: \u201CThe following questions ask about your views of your inkosi.\u201D", ids:["Q21","Q21b","Q22","Q23","Q24"]},
  {n:5, title:"Hypothetical Justice Vignette",
   note:"Read the vignette story aloud exactly as written. Do not summarise or paraphrase.",
   story:"According to Sipho, a particular piece of land has always been in his family and is his to use for farming. But his neighbour Thabo started farming on it this year, claiming that he had the right to use the land because Sipho had not been using it. The two neighbours could not come to an agreement about who should be able to use the land, so they took their dispute to either (a) the village inkosi, or (b) the local Magistrate\u2019s Court \u2014 the lowest-level formal court in South Africa.",
   ids:["Q25","Q26","Q27","Q28","Q29","Q30","Q31","Q32"]},
  {n:6, title:"Hypothetical Prize-Winning Scenario", ids:["Q33","Q34"]},
  {n:7, title:"Demographic Information", note:"The following sections collect demographic information for analysis. All responses remain confidential and are used only by the research team.", ids:["Q36","Q37","Q38","Q39","Q40","Q41","Q42","Q43","Q44"]},
  {n:8, title:"Economic Background", ids:["Q45","Q46","Q47","Q48","Q49","Q50","Q51","Q52"]},
  {n:9, title:"Village Residency and Mobility", ids:["Q53","Q54","Q55","Q56","Q57","Q58"]}
];
const ALL_IDS = SECTIONS.reduce((a,s)=>a.concat(s.ids),[]);

const LS_KEY = 'pgg_survey_state_v1';

    if (s) return JSON.parse(s);
  } catch (e) {}
  return null;
}
function saveState() { try { localStorage.setItem(LS_KEY, JSON.stringify(STATE)); } catch (e) {} }
function makeFreshState() {
  return {
    setup: null,        // { facilitatorName, villageName, villageNumber, villageType, date, wardTC,
                        //   run, numGroups, membersPerGroup, chiefName, chiefAllowed, roster:[{id,name}] }

  };
}

============================================================================= */

/* =============================================================================
   HELPERS
============================================================================= */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg, ms=2000){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),ms); }
function blankAnswers(){ const a={}; ALL_IDS.forEach(id=>{ a[id]=defaultAnswer(Q[id].t); if(Q[id].t==='multi'&&Q[id].other) a[id+'__o']=''; }); return a; }
function isRefusedVal(v){ return v==='Refused' || v==="Don't know"; }
function defaultAnswer(type){
  switch(type){
    case 'multi': return [];
    case 'services': { const o={}; SVC_ROWS.forEach(r=>o[r.key]=''); return o; }
    case 'amount500': return {amount:'', na:false};
    case 'landuse': return {own:'', methods:[], other:''};
    case 'livedout': return {lived:'', where:'', duration:''};
    case 'single': case 'statement5': case 'prizeAB': return {choice:'', other:''}; // .other only used when other:true
    default: return '';
  }
}
function draftAnswers(){ return STATE.draft ? STATE.draft.answers : null; }

/* parse a free-text list of participant IDs (GG_MM); "N/A"/empty => na; "CHIEF" => chief flag */
function parseIdList(raw){
  const t=(raw||'').trim();
  if(!t) return {na:false, ids:[], chief:false, bad:[]};
  if(/^n\s*\/?\s*a$/i.test(t)) return {na:true, ids:[], chief:false, bad:[]};
  const toks=t.split(/[\s,;]+/).filter(Boolean);
  const ids=[], bad=[]; let chief=false;
  toks.forEach(tok=>{
    if(/^chief$/i.test(tok)){ chief=true; return; }
    const p=parsePid(tok);
    if(p) ids.push(makeId(p.g,p.m)); else bad.push(tok);
  });
  return {na:false, ids, chief, bad};
}
function isNum(v){ return v!=='' && v!=null && !isNaN(Number(v)); }
function numVal(v){ return Number(v); }

/* ---- Required-gating: is a question currently required, and is it answered? ----
   A question counts as "answered" when an explicit choice exists. Because every
   choice question carries Refused / Don't know, and idlist carries N/A, and
   number/text fields carry a Refused/DK toggle, requiring an answer never forces
   disclosure — it only prevents *accidental* blanks. */
function isVisibleRequired(id, ans){
  const def=Q[id]; if(!def || def.optional) return false;
  if(id==='Q34'){ return (ans.Q33&&ans.Q33.choice)==='Communicated privately'; }
  if(id==='Q57'){ const q56=ans.Q56&&ans.Q56.choice; return !!q56 && q56!=='Never'; }
  return true;
}
function isAnswered(id, ans){
  const def=Q[id]; const a=ans[id];
  switch(def.t){
    case 'multi':   return !!(a&&a.length>0);
    case 'idlist':  { const p=parseIdList(a); return p.na || p.ids.length>0 || p.chief; }
    case 'number':  case 'text': return a!=='' && a!=null;           // 'Refused' counts
    case 'yesno':   return !!a;
    case 'services':return SVC_ROWS.every(r=>!!a[r.key]);
    case 'amount500':{ const priv=(ans.Q33&&ans.Q33.choice)==='Communicated privately';
                       if(!priv) return true; return a.na || (isNum(a.amount)&&String(a.amount).trim()!==''); }
    case 'landuse': return !!a.own;
    case 'livedout':return !!a.lived;
    case 'idself':  return true;
    default:        return !!(a&&a.choice);                          // single / freq / statement5
  }
}
function missingRequired(secNum, ans){
  const sec=SECTIONS.find(s=>s.n===secNum); if(!sec) return [];
  return sec.ids.filter(id=>isVisibleRequired(id,ans) && !isAnswered(id,ans));
}

/* =============================================================================
   VALIDATION — pure function. Returns { hard:[], soft:[] } of {sec,q,msg}.
============================================================================= */
function validateSurvey(answers, setup){
  const hard=[], soft=[];
  const secOf = id => { for(const s of SECTIONS) if(s.ids.includes(id)) return s.n; return null; };
  const H=(q,msg)=>hard.push({sec:secOf(q), q, msg});
  const S=(q,msg)=>soft.push({sec:secOf(q), q, msg});
  const choice = id => (answers[id]&&typeof answers[id]==='object') ? answers[id].choice : answers[id];

  /* valid participant IDs are GG_MM (group-colour _ member) */
  const selfPid = parsePid(answers.Q7);
  const selfId  = answers.Q7 ? String(answers.Q7).trim() : '';

  /* ---- ID / Q7 ---- */
  if(!selfId){
    H('Q7','ID / Q7 is missing.');
  } else if(!selfPid || !validPid(selfPid.g, selfPid.m, setup)){
    H('Q7','ID '+selfId+' is not a valid participant ID (expected GG_MM, e.g. 01_03; group 1\u2013'+numGroups(setup)+', member 1\u2013'+membersPerGroup(setup)+').');
  }

  /* ---- Q8\u2013Q15 network lists ---- */
  const netParsed={};
  ['Q8','Q9','Q10','Q11','Q12','Q13','Q14','Q15'].forEach(id=>{
    const p=parseIdList(answers[id]); netParsed[id]=p;
    if(p.bad.length) H(id,'Contains entries that are not valid IDs: '+p.bad.join(', ')+'. Use participant IDs like 01_03, the word CHIEF, or N/A.');
    const outOfRange = p.ids.filter(idStr=>{ const q=parsePid(idStr); return !(q && validPid(q.g,q.m,setup)); });
    if(outOfRange.length){
      H(id,'ID(s) not on the whiteboard: '+[...new Set(outOfRange)].join(', ')+'.');
    }
    if(p.chief && setup.chiefAllowed===false) H(id,'The Chief may not be listed as a network contact here.');
    if(selfId && p.ids.includes(selfId)) H(id,'You cannot list your own ID ('+selfId+') here.');
  });
  /* Q8 vs Q9 (same umzi vs different umzi) — should be mutually exclusive (soft) */
  const ov89 = netParsed.Q8.ids.filter(n=>netParsed.Q9.ids.includes(n));
  if(ov89.length) S('Q9','Number(s) appear in both Q8 (same household) and Q9 (relatives in a different umzi): '+ov89.join(', ')+'.');
  /* Q8 vs Q11 (same household vs adjacent-homestead neighbour) — soft */
  const ov811 = netParsed.Q8.ids.filter(n=>netParsed.Q11.ids.includes(n));
  if(ov811.length) S('Q11','Number(s) appear in both Q8 (same household) and Q11 (adjacent-homestead neighbour): '+ov811.join(', ')+'.');

  /* ---- Q5 exclusivity (backstop; input layer also enforces) ---- */
  const q5 = answers.Q5||[];
  const q5excl = (Q.Q5.exclusive||[]).filter(o=>q5.includes(o));
  const q5spec = q5.filter(o=>!(Q.Q5.exclusive||[]).includes(o));
  if(q5excl.length && q5spec.length) H('Q5','\u201C'+q5excl.join(' / ')+'\u201D cannot be combined with specific contacts.');
  if(q5excl.length>1) H('Q5','Only one of None / Don\u2019t know / Refused may be selected.');

  /* ---- Q33 \u2192 Q34 \u2192 Q35 skip logic ---- */
  const q33 = choice('Q33');
  const q34 = answers.Q34 || {amount:'',na:false};
  const q34HasAmount = isNum(q34.amount) && String(q34.amount).trim()!=='' && !q34.na;
  if(q33!=='Communicated privately'){
    if(q34HasAmount) H('Q34','Q34 must be N/A unless Q33 = \u201CCommunicated privately\u201D.');
  }
  if(q34HasAmount){
    const amt = numVal(q34.amount);
    if(amt<0 || amt>500) H('Q34','Willingness-to-pay must be between 0 and 500 ZAR.');
  }

  /* ---- Range checks ---- */
  const age = isNum(answers.Q38) ? numVal(answers.Q38) : null;
  if(answers.Q38!=='' && !isRefusedVal(answers.Q38)){
    if(!isNum(answers.Q38)) H('Q38','Age is not a number.');
    else { if(age<18) S('Q38','Age is below 18 \u2014 confirm participant eligibility / consent.');
           if(age>110) S('Q38','Age over 110 \u2014 please confirm this is correct.'); }
  }
  const hh = isNum(answers.Q43)?numVal(answers.Q43):null;
  if(answers.Q43!=='' && isNum(answers.Q43) && hh<1) H('Q43','Household size must be at least 1 (includes yourself).');
  const work = isNum(answers.Q44)?numVal(answers.Q44):null;
  if(work!=null){
    if(work<0) H('Q44','Number of working members cannot be negative.');
    if(hh!=null && work>hh) H('Q44','Working members ('+work+') cannot exceed household size ('+hh+').');
  }
  const sleep = isNum(answers.Q49)?numVal(answers.Q49):null;
  const rooms = isNum(answers.Q50)?numVal(answers.Q50):null;
  if(rooms!=null && rooms<1) H('Q50','Total rooms must be at least 1.');
  if(sleep!=null){
    if(sleep<1) H('Q49','Sleeping rooms must be at least 1.');
    if(rooms!=null && sleep>rooms) H('Q49','Sleeping rooms ('+sleep+') cannot exceed total rooms ('+rooms+').');
  }
  const yrs = isNum(answers.Q54)?numVal(answers.Q54):null;
  if(yrs!=null){
    if(yrs<0) H('Q54','Years lived cannot be negative.');
    if(age!=null && yrs>age) H('Q54','Years lived in village ('+yrs+') cannot exceed age ('+age+').');
  }

  /* ---- Q52 land-use skip logic ---- */
  const lu = answers.Q52||{own:'',methods:[],other:''};
  if(lu.own==='No' && ((lu.methods&&lu.methods.length) || (lu.other&&lu.other.trim()))) {
    H('Q52','Land-access method must be empty when the answer is \u201CNo\u201D.');
  }

  /* ---- Q55 lived-outside skip logic ---- */
  const lo = answers.Q55||{lived:'',where:'',duration:''};
  if(lo.lived==='No' && ((lo.where&&lo.where.trim()) || (lo.duration&&lo.duration.trim()))) {
    H('Q55','Where / Duration must be empty when the answer is \u201CNo\u201D.');
  }
  if(lo.lived==='Yes' && !(lo.where&&lo.where.trim()) && !(lo.duration&&lo.duration.trim())) {
    S('Q55','Answered \u201CYes\u201D but Where / Duration is blank.');
  }

  /* ---- Q56 \u2192 Q57 skip logic ---- */
  const q56 = choice('Q56');
  const q57 = choice('Q57');
  if(q56==='Never' && (q57 || (answers.Q57 && answers.Q57.other && answers.Q57.other.trim()))) {
    H('Q57','Reason for travel must be N/A when Q56 = \u201CNever\u201D.');
  }

  /* ---- Consistency: Q53 / Q54 / Q55 ---- */
  if(answers.Q53==='Yes' && lo.lived==='No' && yrs!=null && age!=null && (age-yrs)>2){
    S('Q54','Born here and never lived away, but years lived ('+yrs+') is well below age ('+age+').');
  }

  /* ---- Name / ID cross-check against roster (if loaded) ---- */
  if(setup.roster && setup.roster.length && selfId){
    const rec = setup.roster.find(r=>String(r.id).trim()===selfId);
    const name = (answers.Q36||'').trim();
    if(rec && rec.name && name && rec.name.trim().toLowerCase()!==name.toLowerCase()){
      S('Q36','Name \u201C'+name+'\u201D does not match the roster name \u201C'+rec.name+'\u201D for ID '+selfId+'.');
    }
  }
  if(!(answers.Q36||'').trim()) S('Q36','Full name is blank \u2014 needed to cross-check against the household survey.');

  /* ---- Vignette completeness Q25\u2013Q32 ---- */
  const vmiss = ['Q25','Q26','Q27','Q28','Q29','Q30','Q31','Q32'].filter(id=>!choice(id));
  if(vmiss.length && vmiss.length<8) S(vmiss[0],'Vignette is partially answered \u2014 missing '+vmiss.join(', ')+'. Both the inkosi and Magistrate sets should be completed.');

  /* ---- Q51 services sanity ---- */
  const svc = answers.Q51||{};
  if(svc.piped_inside==='No' && svc.piped_yard==='No' && svc.communal_tap==='No' &&
     [svc.piped_inside,svc.piped_yard,svc.communal_tap].every(v=>v!=='')){
    S('Q51','No piped/communal water source recorded \u2014 please confirm.');
  }
  if(svc.flush_inside==='Yes' && svc.flush_outside==='Yes'){
    S('Q51','Both an inside and an outside flush toilet recorded \u2014 uncommon, please confirm.');
  }

  /* ---- General unanswered note (non-blocking) ---- */
  const unanswered=[];
  ALL_IDS.forEach(id=>{
    const def=Q[id]; if(def.optional) return;
    if(id==='Q34'){ if(q33==='Communicated privately' && !q34HasAmount && !q34.na) unanswered.push(id); return; }
    if(id==='Q57'){ if(q56 && q56!=='Never' && !q57) unanswered.push(id); return; }
    const a=answers[id];
    let empty=false;
    if(def.t==='multi') empty = !(a&&a.length);
    else if(def.t==='services') empty = SVC_ROWS.every(r=>!a[r.key]);
    else if(def.t==='landuse') empty = !a.own;
    else if(def.t==='livedout') empty = !a.lived;
    else if(def.t==='yesno') empty = !a;
    else if(typeof a==='object') empty = !a.choice;
    else empty = (a==='' || a==null);
    if(empty) unanswered.push(id);
  });
  if(unanswered.length) soft.push({sec:secOf(unanswered[0]), q:'\u2014', msg:unanswered.length+' question(s) left blank: '+unanswered.join(', ')+'. Confirm these were intentionally skipped.'});

  return {hard, soft};
}

    setup:renderSetup, home:renderHome, idEntry:renderIdEntry,

  };

}

  const s = STATE.setup || {};
  app.innerHTML = `
    <div class="header"><span class="title">PGG Survey \u2014 Setup</span></div>
    <div class="content">
      <p class="muted">Configure this device once for the session. These details are attached to every survey collected on this phone.</p>
      <div class="field"><label>Facilitator Name</label><input id="f-name" value="${escapeHtml(s.facilitatorName||'')}"></div>
      <div class="field"><label>Village Name</label><input id="f-vname" value="${escapeHtml(s.villageName||'')}"></div>

      <div class="field"><label>Village Type</label>
        <select id="f-vtype">
          <option value="">— select —</option>
          <option value="HOMELAND" ${s.villageType==='HOMELAND'?'selected':''}>HOMELAND</option>
          <option value="NON_HOMELAND" ${s.villageType==='NON_HOMELAND'?'selected':''}>NON_HOMELAND</option>
        </select>
      </div>
      <div class="field"><label>Ward / Traditional Council</label><input id="f-ward" value="${escapeHtml(s.wardTC||'')}"></div>
      <div class="field"><label>Date</label><input id="f-date" type="date" value="${escapeHtml(s.date||'')}"></div>
      <hr class="divider">
      <div class="field"><label>Number of groups / colours (max 6)</label><input id="f-ngroups" type="number" inputmode="numeric" min="1" max="6" value="${escapeHtml(s.numGroups!=null?s.numGroups:6)}"></div>
      <div class="field"><label>Members per group</label><input id="f-mpg" type="number" inputmode="numeric" min="1" value="${escapeHtml(s.membersPerGroup!=null?s.membersPerGroup:4)}"></div>
      <p class="qhint">Participant IDs are <b>GG_MM</b> (colour-number _ member): Red=01, Orange=02, Yellow=03, Green=04, Blue=05, Purple=06. With 6 groups \u00d7 4 members, valid IDs run 01_01 \u2026 06_04.</p>
      <div class="field"><label>Chief\u2019s name (shown on the whiteboard, no number)</label><input id="f-chief" value="${escapeHtml(s.chiefName||'')}"></div>
      <div class="opt single ${ (s.chiefAllowed!==false) ?'selected':'' }" id="f-chiefallow">
        <span class="mark">${ (s.chiefAllowed!==false) ?'\u2713':''}</span>
        <span>Allow listing the Chief (write CHIEF) in network questions (Q8\u2013Q15)</span>
      </div>
      <p class="qhint">The Chief has no number. To record a relationship with the Chief in Q8\u2013Q15, the facilitator writes the word CHIEF. This is ON by default; turn off to reject CHIEF as a network contact.</p>
      <button class="btn primary" id="f-save">Save & Continue</button>
      ${STATE.setup?'<button class="btn outline" id="f-cancel">Cancel</button>':''}
    </div>
  `;
  if(!s.date){ document.getElementById('f-date').value=new Date().toISOString().substring(0,10); }
  let chiefAllowed = s.chiefAllowed!==false;
  const ca=document.getElementById('f-chiefallow');
  const chiefInput=document.getElementById('f-chief');
  function paintAllow(){ ca.classList.toggle('selected',chiefAllowed); ca.querySelector('.mark').textContent=chiefAllowed?'\u2713':''; }
  function syncDisable(){
    const has=!!chiefInput.value.trim();
    ca.classList.toggle('opt-disabled',!has);
    if(!has){ chiefAllowed=false; paintAllow(); }
  }
  // if no chief name yet, the toggle starts off & disabled
  if(!chiefInput.value.trim()){ chiefAllowed=false; }
  paintAllow(); syncDisable();
  chiefInput.oninput=()=>{
    const has=!!chiefInput.value.trim();
    if(has && !chiefAllowed){ chiefAllowed=true; }   // entering a name turns listing ON by default
    if(!has){ chiefAllowed=false; }
    paintAllow(); syncDisable();
  };
  ca.onclick=()=>{
    if(!chiefInput.value.trim()){ showToast('Enter the Chief\u2019s name first'); chiefInput.focus(); return; }
    chiefAllowed=!chiefAllowed; paintAllow();
  };
  document.getElementById('f-save').onclick=()=>{
    const name=document.getElementById('f-name').value.trim();
    const vname=document.getElementById('f-vname').value.trim();

    if(!(ng>=1&&ng<=6)){ showToast('Number of groups must be 1\u20136'); return; }
    if(!(mpg>=1)){ showToast('Members per group must be at least 1'); return; }
    STATE.setup={
      facilitatorName:name, villageName:vname, villageNumber:vnum, villageType:vtype,
      wardTC:ward, date:date, run:Number(run), numGroups:ng, membersPerGroup:mpg,
      chiefName: chief, chiefAllowed:chiefAllowed,
      roster: (STATE.setup&&STATE.setup.roster)||[]
    };
    saveState(); go('home');
  };
  const cancel=document.getElementById('f-cancel'); if(cancel) cancel.onclick=()=>go('home');
}

/* ---------- HOME ---------- */
function renderHome(app){
  const s=STATE.setup;
  const surveys=STATE.surveys||[];
  let list='';
  if(surveys.length===0){ list='<p class="muted" style="text-align:center;margin:24px 0;">No surveys collected yet.</p>'; }
  else {
    surveys.slice().sort((a,b)=>idOrder(a.id)-idOrder(b.id)).forEach(sv=>{
      const idx=STATE.surveys.indexOf(sv);
      const name=(sv.answers.Q36||'').trim();
      list+=`<div class="list-card" data-view="${idx}">
        <div class="lc-main"><div class="lc-id">ID ${escapeHtml(sv.id)}${name?' \u00b7 '+escapeHtml(name):''}</div>
        <div class="lc-sub">saved ${escapeHtml((sv.savedAt||'').replace('T',' ').substring(0,16))}</div></div>

  app.innerHTML=`
    <div class="header"><span class="title">PGG Survey</span><button class="home-btn" id="set">\u2699</button></div>
    <div class="content">
      <div style="text-align:center;opacity:0.85;margin-bottom:6px;">
        Village ${escapeHtml(String(s.villageNumber).padStart(2,'0'))} \u00b7 Run ${escapeHtml(s.run!=null?s.run:1)} \u00b7 ${escapeHtml(s.villageType)}<br>
        Facilitator: ${escapeHtml(s.facilitatorName)} \u00b7 ${escapeHtml(numGroups(s))} groups \u00d7 ${escapeHtml(membersPerGroup(s))} (${escapeHtml(makeId(1,1))}\u2013${escapeHtml(makeId(numGroups(s),membersPerGroup(s)))})
      </div>

      ${ STATE.draft
          ? '<button class="btn primary" id="resume">Resume survey (ID '+escapeHtml(STATE.draft.id)+')</button>'
          : '<button class="btn primary" id="new">+ New Survey</button>' }
      <hr class="divider">

  document.getElementById('set').onclick=()=>go('setup');

  const rb=document.getElementById('resume'); if(rb) rb.onclick=()=>go('section',{section:STATE.draft.lastSection||1});

}

    <div class="content">

      <textarea id="rost" class="txt" style="height:240px;font-family:monospace;font-size:14px;" placeholder="01_01,Nomsa Dlamini&#10;01_02,Sipho Mbeki&#10;01_03">${escapeHtml(text)}</textarea>
      <button class="btn primary" id="save">Save roster</button>
