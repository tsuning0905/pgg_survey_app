<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PGG Survey">
<title>PGG Post-Experiment Survey</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ===================== BASE ===================== */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", Roboto, sans-serif;
  /* Deep slate-teal background — deliberately different from the black game app
     so facilitators never confuse the two, but the same translucent-card UI. */
  background: #13343b;
  color: #fff;
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  height: 100%;
}
/* Inputs MUST stay selectable/editable for data entry */
input, textarea, select { -webkit-user-select: text; user-select: text; }
#app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
/* ===================== HEADER ===================== */
.header {
  display: flex; align-items: center;
  padding: 16px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  font-size: 19px; font-weight: 600;
  gap: 10px;
  position: sticky; top: 0; z-index: 10;
  background: #13343b;
}
.header .home-btn {
  background: transparent; border: none; color: inherit;
  font-size: 22px; padding: 4px 8px; cursor: pointer;
}
.header .title { flex: 1; line-height: 1.2; }
.header .step { font-size: 14px; opacity: 0.85; font-weight: 500; }
/* progress bar */
.progress { height: 4px; background: rgba(255,255,255,0.18); }
.progress > div { height: 100%; background: rgba(255,255,255,0.75); transition: width 0.2s; }
/* ===================== CONTENT ===================== */
.content { flex: 1; padding: 16px; display: flex; flex-direction: column; }
.content.center { justify-content: center; align-items: center; text-align: center; }
h2 { font-size: 22px; margin: 8px 0 12px; font-weight: 600; }
h3 { font-size: 17px; margin: 18px 0 6px; font-weight: 600; opacity: 0.95; }
p, label { font-size: 16px; line-height: 1.45; }
.big-msg { font-size: 22px; line-height: 1.5; margin: 12px 0; }
/* ===================== BUTTONS ===================== */
.btn {
  display: block; width: 100%;
  padding: 16px;
  margin: 8px 0;
  font-size: 18px;
  font-weight: 600;
  background: rgba(255,255,255,0.22);
  color: #fff;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  text-align: center;
}
.btn:active { background: rgba(255,255,255,0.35); }
.btn.primary { background: rgba(255,255,255,0.34); }
.btn.outline { background: transparent; border: 1.5px solid rgba(255,255,255,0.6); }
.btn.danger { background: transparent; border: 1.5px solid rgba(255,180,180,0.7); color: #ffdede; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-row { display: flex; gap: 12px; }
.btn-row .btn { flex: 1; }
/* ===================== INPUTS ===================== */
.field { margin: 14px 0; }
.field label { display: block; margin-bottom: 6px; font-size: 14px; opacity: 0.9; }
.field input, .field select, input.txt, input.num {
  width: 100%;
  padding: 13px;
  font-size: 17px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 14px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus, input.txt:focus, input.num:focus { border-color: #fff; }
input::placeholder { color: rgba(255,255,255,0.45); }
input:disabled { opacity: 0.4; }
select option { color: #000; }
/* ===================== QUESTION CARD ===================== */
.qcard {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 14px 14px 12px;
  margin: 12px 0;
}
.qcard .qnum {
  display: inline-block;
  font-weight: 700; font-size: 13px;
  background: rgba(255,255,255,0.25);
  padding: 2px 8px; border-radius: 999px;
  margin-bottom: 6px;
}
.qcard .qtext { font-size: 16px; line-height: 1.4; margin: 2px 0 4px; }
.qcard.invalid { border-color: rgba(255,140,140,0.9); }
.qhint { font-size: 13px; opacity: 0.75; margin: 4px 0; }
.qerr { font-size: 13px; color: #ffd0d0; margin: 6px 0 0; min-height: 0; }
/* ===================== OPTION ROWS ===================== */
.opts { margin-top: 6px; }
.opt {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px;
  margin: 6px 0;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.28);
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px; line-height: 1.3;
}
.opt:active { background: rgba(255,255,255,0.18); }
.opt .mark {
  flex: 0 0 22px; width: 22px; height: 22px;
  border: 2px solid rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.opt.single .mark { border-radius: 50%; }
.opt.multi .mark { border-radius: 6px; }
.opt.selected { background: rgba(255,255,255,0.30); border-color: #fff; }
.opt.selected .mark { background: #fff; color: #13343b; border-color: #fff; }
/* services grid */
.svc-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.12);
}
.svc-row .svc-label { flex: 1; font-size: 14px; }
.svc-row .svc-btns { display: flex; gap: 6px; }
.svc-row .yn {
  padding: 7px 14px; border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06); cursor: pointer; font-size: 14px;
}
.svc-row .yn.on { background: #fff; color: #13343b; border-color: #fff; font-weight: 700; }
/* ===================== NOTES / BANNERS ===================== */
.note {
  background: rgba(255,255,255,0.10);
  border-left: 4px solid rgba(255,255,255,0.6);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 14px; line-height: 1.5;
  margin: 12px 0;
}
.note .flag { font-weight: 700; }
.story {
  background: rgba(0,0,0,0.22);
  border-radius: 12px;
  padding: 14px;
  font-style: italic;
  font-size: 15px; line-height: 1.55;
  margin: 12px 0;
}
.warning {
  background: rgba(255,255,255,0.15);
  border-radius: 12px; padding: 14px; font-size: 14px; margin: 10px 0;
}
.subhead { font-weight: 700; font-size: 16px; margin: 16px 0 4px; }
/* ===================== TAP CHIPS (network IDs / skip pills) ===================== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 9px 13px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06);
  font-size: 15px; font-weight: 600; line-height: 1.1;
  cursor: pointer; min-width: 44px; text-align: center;
}
.chip:active { background: rgba(255,255,255,0.18); }
.chip.on { background: #fff; color: #13343b; border-color: #fff; }
.chip .chip-name { font-size: 10px; font-weight: 500; opacity: 0.75; margin-top: 2px; }
.chip.on .chip-name { opacity: 0.7; }
.chip.na { border-style: dashed; }
.chip.chief.on { background: #ffe9b3; }
.chip.skip { padding: 9px 13px; font-size: 13px; }
.chip.skip.on { background: #ffd9d9; color: #7a1f1f; border-color: #ffd9d9; }
.qwarn { font-size: 13px; color: #ffe1a8; margin: 6px 0 0; min-height: 0; }
.opt-disabled { opacity: 0.4; }
/* ===================== REVIEW ===================== */
.issue {
  border-radius: 12px; padding: 12px 14px; margin: 8px 0; font-size: 14px; line-height: 1.4;
  cursor: pointer;
}
.issue.hard { background: rgba(200,60,60,0.35); border: 1px solid rgba(255,150,150,0.6); }
.issue.soft { background: rgba(220,170,60,0.28); border: 1px solid rgba(255,210,120,0.6); }
.issue .itag { font-weight: 700; margin-right: 6px; }
.ack-row { display: flex; align-items: flex-start; gap: 10px; margin: 14px 0; font-size: 14px; }
.ack-row input { width: 22px; height: 22px; margin-top: 2px; }
/* ===================== LIST CARDS ===================== */
.list-card {
  background: rgba(255,255,255,0.14);
  border-radius: 14px;
  padding: 14px;
  margin: 8px 0;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.list-card .lc-main { flex: 1; }
.list-card .lc-id { font-weight: 700; font-size: 16px; }
.list-card .lc-sub { font-size: 13px; opacity: 0.8; }
.list-card .lc-badge { font-size: 12px; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,0.25); }
/* ===================== UTILITY ===================== */
.spacer { flex: 1; }
.muted { opacity: 0.85; }
hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.35); margin: 16px 0; }
.toast {
  position: fixed; bottom: 20px; left: 20px; right: 20px;
  background: rgba(0,0,0,0.88); color: #fff; padding: 14px; border-radius: 12px;
  text-align: center; font-size: 15px; z-index: 1000;
}
.sticky-foot {
  position: sticky; bottom: 0;
  background: #13343b;
  padding: 10px 0 4px;
  border-top: 1px solid rgba(255,255,255,0.2);
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 3px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =============================================================================
   PGG POST-EXPERIMENT SURVEY — single-file offline PWA
   Reproduces Post_Experiment_Survey_isiXhosa_EC_V2 (Q1-Q58) and enforces the
   skip / range / consistency / exclusivity validation logic.
   All data is stored in localStorage so the app works fully offline.
   UI language mirrors the sibling PGG Field App (translucent cards, dark base).
============================================================================= */
/* ---------- OPTION SETS (reused) ---------- */
const FREQ   = ["Never","Just once or twice","A few times","Often","Don't know","Refused"];
const LIKERT = ["Strongly agree","Agree","Neither agree nor disagree","Disagree","Strongly disagree","Don't know","Refused"];
const CONF   = ["Not at all confident","Slightly confident","Moderately confident","Very confident","Completely confident","Don't know","Refused"];
const SPEED  = ["Within a few days","Within a few weeks","Within a few months","Within a year","More than a year","Don't know","Refused"];
const PAYL   = ["Very unlikely","Somewhat unlikely","Neither","Somewhat likely","Very likely","Don't know","Refused"];
const LAW    = ["Only written law","Mostly written law","Equally both","Mostly customary law (umthetho wesithethe)","Only customary law","Don't know","Refused"];
const STMT5  = ["1 Agree very strongly with Statement 1","2 Agree with Statement 1","3 Agree with neither","4 Agree with Statement 2","5 Agree very strongly with Statement 2","Don't know","Refused"];
/* ---------- PARTICIPANT ID: format is L_MM (group-colour letter _ member) ----------
   Group colour -> letter: Red=R, Orange=O, Yellow=Y, Green=G, Blue=B, Purple=P.
   Members within a group: 01..04. So Red member 1 = "R_01", Purple member 4 = "P_04". */
const GROUP_COLORS = ["Red","Orange","Yellow","Green","Blue","Purple"];
const COLOUR_LETTERS = ['R','O','Y','G','B','P'];
function pad2(n){ return String(n).padStart(2,'0'); }
function makeId(g,m){ return (COLOUR_LETTERS[g-1]||pad2(g))+'_'+pad2(m); }
/* parse a "L_MM" token -> {g,m} or null (L = single letter R/O/Y/G/B/P, or legacy 2-digit number) */
function parsePid(tok){
  const s=String(tok==null?'':tok).trim();
  // New letter format: R_01, B_03, etc.
  const mtL=/^([ROYGBProygbp])[_\-](\d{1,2})$/.exec(s);
  if(mtL){
    const g=COLOUR_LETTERS.indexOf(mtL[1].toUpperCase())+1;
    const m=parseInt(mtL[2],10);
    return g>=1?{g,m}:null;
  }
  // Legacy numeric format: 01_01, 05_02 etc. (for backward compatibility)
  const mtN=/^(\d{1,2})[_\-](\d{1,2})$/.exec(s);
  return mtN?{g:parseInt(mtN[1],10), m:parseInt(mtN[2],10)}:null;
}
function numGroups(setup){ const n=Number(setup&&setup.numGroups); return (n>=1&&n<=GROUP_COLORS.length)?n:GROUP_COLORS.length; }
function membersPerGroup(setup){ const n=Number(setup&&setup.membersPerGroup); return n>=1?n:4; }
function validPid(g,m,setup){ return Number.isInteger(g)&&Number.isInteger(m)&&g>=1&&g<=numGroups(setup)&&m>=1&&m<=membersPerGroup(setup); }
function idOrder(id){ const p=parsePid(id); return p?(p.g*1000+p.m):999999; }
/* CSV participant_id: {village}_{run}_{colour_letter}_{member}, e.g. 01_01_B_02. twoPart is "L_MM". */
function participantIdFull(village, run, twoPart){
  return pad2(Number(village)||0)+'_'+pad2(Number(run)||1)+'_'+String(twoPart||'');
}
/* ---------- QUESTION SCHEMA ----------
   type drives both rendering and validation.
     single   : choose exactly one (opts)
     multi    : choose any (opts), with `exclusive` options
     likert / single-with-options : single
     statement5: single with two anchor statements
     idself   : Q7, auto-filled from the survey ID (read-only)
     idlist   : free text list of participant numbers / N/A
     number   : numeric entry
     text     : free text
     services : Q51 Yes/No grid
     amount500: Q34 (amount 0-500 OR N/A, conditional on Q33)
     prizeAB  : Q35 (conditional on Q34)
     yesno    : simple Yes/No
     landuse  : Q52 (Yes/No + acquisition methods + other)
     livedout : Q55 (Yes/No + where + duration)
   `other:true` adds an "Other: ___" free-text reveal.
   `optional:true` suppresses the unanswered-flag at review.
============================================================================= */
const SVC_ROWS = [
  {key:"electricity",   label:"Electricity"},
  {key:"piped_inside",  label:"Piped water inside dwelling"},
  {key:"piped_yard",    label:"Piped water in yard"},
  {key:"communal_tap",  label:"Communal tap (standpipe)"},
  {key:"flush_inside",  label:"Flush toilet (inside)"},
  {key:"flush_outside", label:"Flush toilet (outside)"},
  {key:"pit_latrine",   label:"Pit latrine / VIP"},
  {key:"bucket",        label:"Bucket system"}
];
const LANDUSE_METHODS = [
  "Allocated by the inkosi / Traditional Council",
  "Permission to Occupy (PTO)",
  "Communal grazing — no individual allocation",
  "Registered title deed",
  "Inherited within the family",
  "Other",
  "Don't know","Refused"
];
/* Q21 (E1) — how the community is informed about use of funds/materials */
const INFORM_OPTS = [
  "Announced at an imbizo before and after the project",
  "Verbal announcement by the induna or headman",
  "Written notice posted in the village",
  "WhatsApp / community group message",
  "Committee report",
  "Not usually announced",
  "Other",
  "Don't know","Refused"
];
/* Q21b (E2) — who keeps records/receipts for a community fund */
const RECORD_OPTS = [
  "Inkosi",
  "Traditional Council treasurer",
  "Village / ward committee",
  "Ward councillor's office",
  "NGO / implementing partner",
  "No one keeps records",
  "Other",
  "Don't know","Refused"
];
const Q = {
  Q1:{t:"freq",  text:"Over the past year, how often have you attended meetings of a church group (other than regular religious services)?", opts:FREQ},
  Q2:{t:"freq",  text:"Over the past year, how often have you attended meetings of a local self-help association such as a stokvel, burial society (umbutho wangcwabo), or neighbourhood watch?", opts:FREQ},
  Q3:{t:"freq",  text:"Over the past year, how often have you attended meetings of a group concerned with local matters such as schools, housing, water, or communal land?", opts:FREQ},
  Q4:{t:"freq",  text:"Over the past year, how often have you attended meetings of a local commercial organisation such as a business group, spaza association, or farmers' association?", opts:FREQ},
  Q5:{t:"multi", text:"Over the past year, have you contacted any of the following people about important problems or to give them your views? (Select all that apply)",
      opts:["The inkosi / ikhosi","The induna or headman","A church leader / umfundisi","A community leader (not traditional)","A ward councillor","A trade union official","None of the above","Don't know","Refused"],
      exclusive:["None of the above","Don't know","Refused"]},
  Q6:{t:"single",text:"When you get together with friends or neighbours, would you say you discuss community or political matters?",
      opts:["Frequently","Occasionally","Never","Don't know","Refused"]},
  Q7:{t:"idself", text:"Your sticker ID is:"},
  Q8:{t:"idlist", text:"Which participants are household members of yours — e.g. spouse, parent, child, or sibling? (Write participant numbers)"},
  Q9:{t:"idlist", text:"Which participants are relatives living in a different homestead (umzi) from yours? (Write participant numbers)"},
  Q10:{t:"idlist",text:"Which participants share your clan surname (isiduko) but are not close family? (Write participant numbers)"},
  Q11:{t:"idlist",text:"Which participants are neighbours — living in the adjacent homestead to yours? (Write participant numbers)"},
  Q12:{t:"idlist",text:"Which participants would you discuss important matters with — e.g. land, farming, finance, disputes, or imbizo decisions? (Write participant numbers)"},
  Q13:{t:"idlist",text:"Which participants would you borrow money from, lend money to, or exchange gifts with in a financial emergency? (Write participant numbers)"},
  Q14:{t:"idlist",text:"Which participants do you cooperate with in farming or business activities — e.g. sharing tools, joint herding, ilima work parties, joint trading? (Write participant numbers)"},
  Q15:{t:"idlist",text:"Which participants are izifiki — newcomers or people from outside your clan area — that you know by name? (Write participant numbers)"},
  Q16:{t:"single",text:"It is safe to openly express disagreement in this village — including at an imbizo.", opts:LIKERT},
  Q17:{t:"single",text:"Major decisions in this village are usually made through open discussion (e.g. at an imbizo).", opts:LIKERT},
  Q18:{t:"single",text:"People in the village usually follow rules and norms that have been decided together.", opts:LIKERT},
  Q19:{t:"single",text:"People in the village usually act for the collective good (ubuntu) — for example, by participating in ilima, maintaining communal water points, or contributing to shared projects.", opts:LIKERT},
  Q20:{t:"single",text:"Generally speaking, would you say that most people in this village can be trusted, or that you can't be too careful in dealing with people?",
      opts:["Most people can be trusted","Can't be too careful","Don't know","Refused"]},
  Q21:{t:"multi", other:true,
      text:"If money or materials are provided for a community purpose, how are community members usually informed about how they are used? (Select all that apply)",
      opts:INFORM_OPTS, exclusive:["Not usually announced","Don't know","Refused"]},
  Q21b:{t:"multi", other:true,
      text:"Who normally keeps records or receipts for a community fund or project? (Select all that apply)",
      opts:RECORD_OPTS, exclusive:["No one keeps records","Don't know","Refused"]},
  Q22:{t:"single",text:"Villagers are able to openly challenge the inkosi's decisions.", opts:LIKERT},
  Q23:{t:"single",text:"People who have good relationships with the inkosi or induna find it easier to access resources such as land, grants, or jobs.", opts:LIKERT},
  Q24:{t:"single",text:"Decisions about resources in this village sometimes favour particular families or clans (isiduko).", opts:LIKERT},
  Q25:{t:"single",text:"When the inkosi makes a decision, how confident are you that this decision will be fair?", opts:CONF,
      groupHeader:"(a) If they took their dispute to the village inkosi:"},
  Q26:{t:"single",text:"How quickly do you think the inkosi will make a decision?", opts:SPEED},
  Q27:{t:"single",text:"How likely is it that Sipho and Thabo will have to make payments — formal or informal — to the inkosi to settle the case?", opts:PAYL},
  Q28:{t:"single",text:"Will the inkosi rely on written South African law, on isiXhosa customary law (umthetho wesithethe), or equally on both?", opts:LAW},
  Q29:{t:"single",text:"When the Magistrate's Court makes a decision, how confident are you that this decision will be fair?", opts:CONF,
      groupHeader:"(b) If they took their dispute to the local Magistrate's Court:"},
  Q30:{t:"single",text:"How quickly do you think the Magistrate's Court will make a decision?", opts:SPEED},
  Q31:{t:"single",text:"How likely is it that Sipho and Thabo will have to make payments — formal or informal — to the Magistrate's Court to settle the case?", opts:PAYL},
  Q32:{t:"single",text:"Will the Magistrate's Court rely on written South African law, on isiXhosa customary law (umthetho wesithethe), or equally on both?", opts:LAW},
  Q33:{t:"single",text:"If you won a prize of R500 in this experiment, would you prefer the result to be announced publicly in this room, or communicated to you privately?",
      opts:["It doesn't matter to me","Announced publicly in this room","Communicated privately"]},
  Q34:{t:"amount500",text:"If you prefer to receive the result privately, what is the maximum amount you would be willing to pay to keep the result private? (Only answer if you chose 'Communicated privately' above)"},
  Q36:{t:"text",  text:"Your full name:", placeholder:"Full name"},
  Q37:{t:"single",text:"Gender:", opts:["Male","Female","Other / prefer not to say"]},
  Q38:{t:"number",text:"Age:", unit:"years", min:0, max:130, intOnly:true},
  Q39:{t:"single",text:"Marital status:", opts:["Single","Married (customary / ilobolo)","Married (civil / legal)","Widowed","Divorced / separated"]},
  Q40:{t:"single",text:"Highest level of education completed:", opts:["No formal education","Some primary (Grades 1–6)","Completed primary (Grade 7)","Some secondary (Grades 8–11)","Matric / Grade 12","Post-school certificate / diploma","University degree or above"]},
  Q41:{t:"text",  text:"Main occupation:", placeholder:"Main occupation"},
  Q42:{t:"text",  text:"Secondary occupation (if any):", placeholder:"Leave blank if none", optional:true},
  Q43:{t:"number",text:"Total number of people living in your household, including yourself:", unit:"persons", min:0, max:60, intOnly:true},
  Q44:{t:"number",text:"Number of working household members (anyone earning income, including grants):", unit:"persons", min:0, max:60, intOnly:true},
  Q45:{t:"single",other:true,text:"What is the PRIMARY source of your household's income? (Select the most important one)",
      opts:["Farming / livestock","Wage employment (formal job)","Casual / piece work (temporary)","Self-employment / spaza / hawking","Government grants (e.g. child support grant, old-age pension, disability grant)","Remittances — money sent by family members from the city or at the mines","Other"]},
  Q46:{t:"single",text:"Is your household income:", opts:["Regular and predictable","Seasonal (e.g. harvest, contract work)","Irregular","Very uncertain"]},
  Q47:{t:"single",text:"What is the approximate total monthly income of your household before expenses? (Include wages, grants, remittances, business income)",
      opts:["No income","Less than R1,000","R1,001 – R3,000","R3,001 – R6,000","R6,001 – R12,000","R12,001 – R25,000","More than R25,000","Don't know","Refused"]},
  Q48:{t:"single",other:true,text:"What is the main material of the roof of your household's dwelling?",
      opts:["Thatch / grass / traditional materials","Corrugated iron / zinc / metal sheets","Asbestos sheets","Tiles","Concrete / cement slab","Mixed materials","Other","Don't know","Refused"]},
  Q49:{t:"number",text:"Number of rooms used for sleeping:", unit:"rooms", min:0, max:40, intOnly:true},
  Q50:{t:"number",text:"Total number of rooms:", unit:"rooms", min:0, max:40, intOnly:true},
  Q51:{t:"services",text:"Which of the following services does your household have access to? (Yes or No for each)"},

/* =============================================================================
   HELPERS
============================================================================= */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg, ms=2000){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),ms); }
function blankAnswers(){ const a={}; ALL_IDS.forEach(id=>{ a[id]=defaultAnswer(Q[id].t); if(Q[id].t==='multi'&&Q[id].other) a[id+'__o']=''; }); return a; }
function isRefusedVal(v){ return v==='Refused' || v==="Don't know"; }
function defaultAnswer(type){
  switch(type){
    case 'multi': return [];
    case 'services': { const o={}; SVC_ROWS.forEach(r=>o[r.key]=''); return o; }
    case 'amount500': return {amount:'', na:false};
    case 'landuse': return {own:'', methods:[], other:''};
    case 'livedout': return {lived:'', where:'', duration:''};
    case 'single': case 'statement5': case 'prizeAB': return {choice:'', other:''}; // .other only used when other:true
    default: return '';
  }
}
function draftAnswers(){ return STATE.draft ? STATE.draft.answers : null; }
/* parse a free-text list of participant IDs (L_MM); "N/A"/empty => na; "CHIEF" => chief flag */
function parseIdList(raw){
  const t=(raw||'').trim();
  if(!t) return {na:false, ids:[], chief:false, bad:[]};
  if(/^n\s*\/?\s*a$/i.test(t)) return {na:true, ids:[], chief:false, bad:[]};
  const toks=t.split(/[\s,;]+/).filter(Boolean);
  const ids=[], bad=[]; let chief=false;
  toks.forEach(tok=>{
    if(/^chief$/i.test(tok)){ chief=true; return; }
    const p=parsePid(tok);
    if(p) ids.push(makeId(p.g,p.m)); else bad.push(tok);
  });
  return {na:false, ids, chief, bad};
}
function isNum(v){ return v!=='' && v!=null && !isNaN(Number(v)); }
function numVal(v){ return Number(v); }
/* ---- Required-gating: is a question currently required, and is it answered? ----
   A question counts as "answered" when an explicit choice exists. Because every
   choice question carries Refused / Don't know, and idlist carries N/A, and
   number/text fields carry a Refused/DK toggle, requiring an answer never forces
   disclosure — it only prevents *accidental* blanks. */
function isVisibleRequired(id, ans){
  const def=Q[id]; if(!def || def.optional) return false;
  if(id==='Q34'){ return (ans.Q33&&ans.Q33.choice)==='Communicated privately'; }
  if(id==='Q57'){ const q56=ans.Q56&&ans.Q56.choice; return !!q56 && q56!=='Never'; }
  return true;
}
function isAnswered(id, ans){
  const def=Q[id]; const a=ans[id];
  switch(def.t){
    case 'multi':   return !!(a&&a.length>0);
    case 'idlist':  { const p=parseIdList(a); return p.na || p.ids.length>0 || p.chief; }
    case 'number':  case 'text': return a!=='' && a!=null;           // 'Refused' counts
    case 'yesno':   return !!a;
    case 'services':return SVC_ROWS.every(r=>!!a[r.key]);
    case 'amount500':{ const priv=(ans.Q33&&ans.Q33.choice)==='Communicated privately';
                       if(!priv) return true; return a.na || (isNum(a.amount)&&String(a.amount).trim()!==''); }
    case 'landuse': return !!a.own;
    case 'livedout':return !!a.lived;
    case 'idself':  return true;
    default:        return !!(a&&a.choice);                          // single / freq / statement5
  }
}
function missingRequired(secNum, ans){
  const sec=SECTIONS.find(s=>s.n===secNum); if(!sec) return [];
  return sec.ids.filter(id=>isVisibleRequired(id,ans) && !isAnswered(id,ans));
}
/* =============================================================================
   VALIDATION — pure function. Returns { hard:[], soft:[] } of {sec,q,msg}.
============================================================================= */
function validateSurvey(answers, setup){
  const hard=[], soft=[];
  const secOf = id => { for(const s of SECTIONS) if(s.ids.includes(id)) return s.n; return null; };
  const H=(q,msg)=>hard.push({sec:secOf(q), q, msg});
  const S=(q,msg)=>soft.push({sec:secOf(q), q, msg});
  const choice = id => (answers[id]&&typeof answers[id]==='object') ? answers[id].choice : answers[id];
  /* valid participant IDs are L_MM (colour letter _ member) */
  const selfPid = parsePid(answers.Q7);
  const selfId  = answers.Q7 ? String(answers.Q7).trim() : '';
  /* ---- ID / Q7 ---- */
  if(!selfId){
    H('Q7','ID / Q7 is missing.');
  } else if(!selfPid || !validPid(selfPid.g, selfPid.m, setup)){
    H('Q7','ID '+selfId+' is not a valid participant ID (expected L_MM, e.g. R_03; group R/O/Y/G/B/P, member 1\u2013'+membersPerGroup(setup)+').');
  }
  /* ---- Q8\u2013Q15 network lists ---- */
  const netParsed={};
  ['Q8','Q9','Q10','Q11','Q12','Q13','Q14','Q15'].forEach(id=>{
    const p=parseIdList(answers[id]); netParsed[id]=p;
    if(p.bad.length) H(id,'Contains entries that are not valid IDs: '+p.bad.join(', ')+'. Use participant IDs like R_03, the word CHIEF, or N/A.');
    const outOfRange = p.ids.filter(idStr=>{ const q=parsePid(idStr); return !(q && validPid(q.g,q.m,setup)); });
    if(outOfRange.length){
      H(id,'ID(s) not in the valid range: '+[...new Set(outOfRange)].join(', ')+'.');
    }
    if(p.chief && setup.chiefAllowed===false) H(id,'The Chief may not be listed as a network contact here.');
    if(selfId && p.ids.includes(selfId)) H(id,'You cannot list your own ID ('+selfId+') here.');
  });
  /* Q8 vs Q9 (same umzi vs different umzi) — should be mutually exclusive (soft) */
  const ov89 = netParsed.Q8.ids.filter(n=>netParsed.Q9.ids.includes(n));
  if(ov89.length) S('Q9','Number(s) appear in both Q8 (same household) and Q9 (relatives in a different umzi): '+ov89.join(', ')+'.');
  /* Q8 vs Q11 (same household vs adjacent-homestead neighbour) — soft */
  const ov811 = netParsed.Q8.ids.filter(n=>netParsed.Q11.ids.includes(n));
  if(ov811.length) S('Q11','Number(s) appear in both Q8 (same household) and Q11 (adjacent-homestead neighbour): '+ov811.join(', ')+'.');
  /* ---- Q5 exclusivity (backstop; input layer also enforces) ---- */
  const q5 = answers.Q5||[];
  const q5excl = (Q.Q5.exclusive||[]).filter(o=>q5.includes(o));
  const q5spec = q5.filter(o=>!(Q.Q5.exclusive||[]).includes(o));
  if(q5excl.length && q5spec.length) H('Q5','\u201C'+q5excl.join(' / ')+'\u201D cannot be combined with specific contacts.');
  if(q5excl.length>1) H('Q5','Only one of None / Don\u2019t know / Refused may be selected.');
  /* ---- Q33 \u2192 Q34 \u2192 Q35 skip logic ---- */
  const q33 = choice('Q33');
  const q34 = answers.Q34 || {amount:'',na:false};
  const q34HasAmount = isNum(q34.amount) && String(q34.amount).trim()!=='' && !q34.na;
  if(q33!=='Communicated privately'){
    if(q34HasAmount) H('Q34','Q34 must be N/A unless Q33 = \u201CCommunicated privately\u201D.');
  }
  if(q34HasAmount){
    const amt = numVal(q34.amount);
    if(amt<0 || amt>500) H('Q34','Willingness-to-pay must be between 0 and 500 ZAR.');
  }
  /* ---- Range checks ---- */
  const age = isNum(answers.Q38) ? numVal(answers.Q38) : null;
  if(answers.Q38!=='' && !isRefusedVal(answers.Q38)){
    if(!isNum(answers.Q38)) H('Q38','Age is not a number.');
    else { if(age<18) S('Q38','Age is below 18 \u2014 confirm participant eligibility / consent.');
           if(age>110) S('Q38','Age over 110 \u2014 please confirm this is correct.'); }
  }
  const hh = isNum(answers.Q43)?numVal(answers.Q43):null;
  if(answers.Q43!=='' && isNum(answers.Q43) && hh<1) H('Q43','Household size must be at least 1 (includes yourself).');
  const work = isNum(answers.Q44)?numVal(answers.Q44):null;
  if(work!=null){
    if(work<0) H('Q44','Number of working members cannot be negative.');
    if(hh!=null && work>hh) H('Q44','Working members ('+work+') cannot exceed household size ('+hh+').');
  }
  const sleep = isNum(answers.Q49)?numVal(answers.Q49):null;
  const rooms = isNum(answers.Q50)?numVal(answers.Q50):null;
  if(rooms!=null && rooms<1) H('Q50','Total rooms must be at least 1.');
  if(sleep!=null){
    if(sleep<1) H('Q49','Sleeping rooms must be at least 1.');
    if(rooms!=null && sleep>rooms) H('Q49','Sleeping rooms ('+sleep+') cannot exceed total rooms ('+rooms+').');
  }
  const yrs = isNum(answers.Q54)?numVal(answers.Q54):null;
  if(yrs!=null){
    if(yrs<0) H('Q54','Years lived cannot be negative.');
    if(age!=null && yrs>age) H('Q54','Years lived in village ('+yrs+') cannot exceed age ('+age+').');
  }
  /* ---- Q52 land-use skip logic ---- */
  const lu = answers.Q52||{own:'',methods:[],other:''};
  if(lu.own==='No' && ((lu.methods&&lu.methods.length) || (lu.other&&lu.other.trim()))) {
    H('Q52','Land-access method must be empty when the answer is \u201CNo\u201D.');
  }
  /* ---- Q55 lived-outside skip logic ---- */
  const lo = answers.Q55||{lived:'',where:'',duration:''};
  if(lo.lived==='No' && ((lo.where&&lo.where.trim()) || (lo.duration&&lo.duration.trim()))) {
    H('Q55','Where / Duration must be empty when the answer is \u201CNo\u201D.');
  }
  if(lo.lived==='Yes' && !(lo.where&&lo.where.trim()) && !(lo.duration&&lo.duration.trim())) {
    S('Q55','Answered \u201CYes\u201D but Where / Duration is blank.');
  }
  /* ---- Q56 \u2192 Q57 skip logic ---- */
  const q56 = choice('Q56');
  const q57 = choice('Q57');
  if(q56==='Never' && (q57 || (answers.Q57 && answers.Q57.other && answers.Q57.other.trim()))) {
    H('Q57','Reason for travel must be N/A when Q56 = \u201CNever\u201D.');
  }
  /* ---- Consistency: Q53 / Q54 / Q55 ---- */
  if(answers.Q53==='Yes' && lo.lived==='No' && yrs!=null && age!=null && (age-yrs)>2){
    S('Q54','Born here and never lived away, but years lived ('+yrs+') is well below age ('+age+').');
  }
  /* ---- Name / ID cross-check against roster (if loaded) ---- */
  if(setup.roster && setup.roster.length && selfId){
    const rec = setup.roster.find(r=>String(r.id).trim()===selfId);
    const name = (answers.Q36||'').trim();
    if(rec && rec.name && name && rec.name.trim().toLowerCase()!==name.toLowerCase()){
      S('Q36','Name \u201C'+name+'\u201D does not match the roster name \u201C'+rec.name+'\u201D for ID '+selfId+'.');
    }
  }
  if(!(answers.Q36||'').trim()) S('Q36','Full name is blank \u2014 needed to cross-check against the household survey.');
  /* ---- Vignette completeness Q25\u2013Q32 ---- */
  const vmiss = ['Q25','Q26','Q27','Q28','Q29','Q30','Q31','Q32'].filter(id=>!choice(id));
  if(vmiss.length && vmiss.length<8) S(vmiss[0],'Vignette is partially answered \u2014 missing '+vmiss.join(', ')+'. Both the inkosi and Magistrate sets should be completed.');
  /* ---- Q51 services sanity ---- */
  const svc = answers.Q51||{};
  if(svc.piped_inside==='No' && svc.piped_yard==='No' && svc.communal_tap==='No' &&
     [svc.piped_inside,svc.piped_yard,svc.communal_tap].every(v=>v!=='')){
    S('Q51','No piped/communal water source recorded \u2014 please confirm.');
  }
  if(svc.flush_inside==='Yes' && svc.flush_outside==='Yes'){
    S('Q51','Both an inside and an outside flush toilet recorded \u2014 uncommon, please confirm.');
  }
  /* ---- General unanswered note (non-blocking) ---- */
  const unanswered=[];
  ALL_IDS.forEach(id=>{
    const def=Q[id]; if(def.optional) return;
    if(id==='Q34'){ if(q33==='Communicated privately' && !q34HasAmount && !q34.na) unanswered.push(id); return; }
    if(id==='Q57'){ if(q56 && q56!=='Never' && !q57) unanswered.push(id); return; }
    const a=answers[id];
    let empty=false;
    if(def.t==='multi') empty = !(a&&a.length);
    else if(def.t==='services') empty = SVC_ROWS.every(r=>!a[r.key]);
    else if(def.t==='landuse') empty = !a.own;
    else if(def.t==='livedout') empty = !a.lived;
    else if(def.t==='yesno') empty = !a;
    else if(typeof a==='object') empty = !a.choice;
    else empty = (a==='' || a==null);
    if(empty) unanswered.push(id);
  });
  if(unanswered.length) soft.push({sec:secOf(unanswered[0]), q:'\u2014', msg:unanswered.length+' question(s) left blank: '+unanswered.join(', ')+'. Confirm these were intentionally skipped.'});
  return {hard, soft};
}

function renderSection(app){
  const secNum=routeArgs.section||1;
  const sec=SECTIONS.find(s=>s.n===secNum);
  const ans=draftAnswers();
  if(!ans){ go('home'); return; }
  STATE.draft.lastSection=secNum; saveState();
  let body='';
  if(sec.note) body+=`<div class="note"><span class="flag">\u2691 Facilitator:</span> ${escapeHtml(sec.note)}</div>`;
  if(sec.instruction) body+=`<div class="note">${escapeHtml(sec.instruction)}</div>`;
  if(sec.story) body+=`<div class="story">${escapeHtml(sec.story)}</div>`;
  sec.ids.forEach(id=>{ body+=renderQuestion(id, ans); });
  const pct=Math.round(secNum/SECTIONS.length*100);
  app.innerHTML=`
    <div class="header">
      <button class="home-btn" id="home">\u2302</button>
      <span class="title">${secNum}. ${escapeHtml(sec.title)}<div class="step">ID ${escapeHtml(STATE.draft.id)} \u00b7 Section ${secNum} of ${SECTIONS.length}</div></span>
    </div>
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="content" id="qbody">${body}
      <div class="sticky-foot">
        <div class="btn-row">
          <button class="btn outline" id="prev">${secNum===1?'\u2302 Home':'\u2190 Back'}</button>
          <button class="btn primary" id="next">${secNum===SECTIONS.length?'Review \u2192':'Next \u2192'}</button>
        </div>
      </div>
    </div>`;
  wireQuestions(sec, ans);
  document.getElementById('home').onclick=()=>{ saveState(); go('home'); };
  document.getElementById('prev').onclick=()=>{ saveState(); if(secNum===1) go('home'); else go('section',{section:secNum-1}); };
  document.getElementById('next').onclick=()=>{
    saveState();
    const hard=showSectionIssues(secNum);
    const missing=missingRequired(secNum, ans);
    missing.forEach(id=>{
      const card=document.getElementById('card-'+id);
      const err=document.getElementById('err-'+id);
      if(card) card.classList.add('invalid');
      if(err && !err.textContent) err.textContent='\u26A0 Please answer this (or tap Refused / Don\u2019t know / N/A).';
    });
    if(hard.length || missing.length){
      showToast('Please answer every question on this page first');
      const firstId = missing.length ? missing[0] : hard[0].q;
      const first=document.getElementById('card-'+firstId);
      if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    if(secNum===SECTIONS.length) go('review'); else go('section',{section:secNum+1});
  };
}
/* Validate the whole draft but surface only the CURRENT section's HARD errors
   inline (red card + message). Returns the array of hard issues for this section. */
function showSectionIssues(secNum){
  const ans=draftAnswers(); if(!ans) return [];
  const r=validateSurvey(ans, STATE.setup);
  document.querySelectorAll('.qcard.invalid').forEach(c=>c.classList.remove('invalid'));
  document.querySelectorAll('.qerr').forEach(e=>{ if(e.id&&e.id.indexOf('err-')===0) e.textContent=''; });
  const hard=r.hard.filter(i=>i.sec===secNum);
  hard.forEach(i=>{
    const card=document.getElementById('card-'+i.q);
    const err=document.getElementById('err-'+i.q);
    if(card) card.classList.add('invalid');
    if(err) err.textContent='\u26A0 '+i.msg;
  });
  return hard;
}
/* ---------- render one question ---------- */
function renderQuestion(id, ans){
  const def=Q[id]; const a=ans[id];
  let inner='';
  const choice = (a&&typeof a==='object')?a.choice:a;
  if(def.groupHeader) inner+=`<div class="subhead">${escapeHtml(def.groupHeader)}</div>`;
  inner+=`<div class="qcard" id="card-${id}">`;
  inner+=`<span class="qnum">${id}</span>`;
  if(def.t==='statement5'){
    inner+=`<div class="qtext"><b>Statement 1:</b> ${escapeHtml(def.s1)}</div>`;
  } else {
    inner+=`<div class="qtext">${escapeHtml(def.text)}${def.optional?' <span class="muted">(optional)</span>':''}</div>`;
  }
  switch(def.t){
    case 'freq': case 'single': case 'statement5': case 'prizeAB': {
      inner+='<div class="opts">';
      def.opts.forEach(o=>{
        const sel = choice===o;
        inner+=`<div class="opt single ${sel?'selected':''}" data-q="${id}" data-val="${escapeHtml(o)}"><span class="mark">${sel?'\u25CF':''}</span><span>${escapeHtml(o)}</span></div>`;
      });
      inner+='</div>';
      if(def.t==='statement5') inner+=`<div class="qtext" style="margin-top:8px;"><b>Statement 2:</b> ${escapeHtml(def.s2)}</div>`;
      if(def.other && choice==='Other') inner+=`<div class="field"><input class="txt" data-q="${id}" data-other="1" placeholder="Please specify" value="${escapeHtml(a.other||'')}"></div>`;
      break;
    }
    case 'multi': {
      inner+='<div class="opts">';
      (def.opts).forEach(o=>{
        const sel=(a||[]).includes(o);
        inner+=`<div class="opt multi ${sel?'selected':''}" data-q="${id}" data-val="${escapeHtml(o)}"><span class="mark">${sel?'\u2713':''}</span><span>${escapeHtml(o)}</span></div>`;
      });
      inner+='</div>';
      if(def.other && (a||[]).includes('Other')){
        inner+=`<div class="field"><input class="txt" data-q="${id}" data-multiother="1" placeholder="Please specify" value="${escapeHtml(ans[id+'__o']||'')}"></div>`;
      }
      break;
    }
    case 'idself': {
      inner+=`<div class="field"><input class="num" value="${escapeHtml(ans.Q7||'')}" disabled></div><div class="qhint">Auto-filled from the participant ID (kept identical by design).</div>`;
      break;
    }
    case 'idlist': {
      const setup=STATE.setup||{};
      const selfId = ans.Q7 ? String(ans.Q7).trim() : '';
      const p = parseIdList(a);
      const ng=numGroups(setup), mpg=membersPerGroup(setup);
      const roster=setup.roster||[];
      const nameOf = cid => { const r=roster.find(x=>String(x.id).trim()===cid); return (r&&r.name)?r.name:''; };
      let chips=`<span class="chip na ${p.na?'on':''}" data-q="${id}" data-chip="NA">N/A (none)</span>`;
      if(setup.chiefAllowed!==false && (setup.chiefName||'').trim()){
        chips+=`<span class="chip chief ${p.chief?'on':''}" data-q="${id}" data-chip="CHIEF">CHIEF${setup.chiefName?(' \u00b7 '+escapeHtml(setup.chiefName)):''}</span>`;
      }
      for(let g=1; g<=ng; g++) for(let m=1; m<=mpg; m++){
        const cid=makeId(g,m); if(cid===selfId) continue;
        const on=p.ids.includes(cid); const nm=nameOf(cid);
        chips+=`<span class="chip ${on?'on':''}" data-q="${id}" data-chip="${cid}">${cid}${nm?'<span class="chip-name">'+escapeHtml(nm)+'</span>':''}</span>`;
      }
      inner+=`<div class="qhint">Tap every participant who applies. Tap again to remove. \u201CN/A\u201D = no one.</div>`;
      inner+=`<div class="chips">${chips}</div>`;
      break;
    }
    case 'number': {
      const refused = isRefusedVal(a);
      inner+=`<div class="field" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <input class="num" data-q="${id}" data-num="1" type="text" inputmode="numeric" ${def.intOnly?'pattern="[0-9]*"':''} value="${escapeHtml(refused?'':(a||''))}" ${refused?'disabled':''} style="max-width:140px;">
        <span class="muted">${escapeHtml(def.unit||'')}</span>
        ${def.optional?'':`<span class="chip skip ${refused?'on':''}" data-q="${id}" data-skip="1">Refused / DK</span>`}
      </div>
      <div class="qwarn" id="warn-${id}"></div>`;
      break;
    }
    case 'text': {
      const refused = isRefusedVal(a);
      inner+=`<div class="field" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <input class="txt" data-q="${id}" placeholder="${escapeHtml(def.placeholder||'')}" value="${escapeHtml(refused?'':(a||''))}" ${refused?'disabled':''} style="flex:1;min-width:160px;">
        ${def.optional?'':`<span class="chip skip ${refused?'on':''}" data-q="${id}" data-skip="1">Refused / DK</span>`}
      </div>`;
      break;
    }
    case 'yesno': {
      ['Yes','No'].forEach(o=>{ const sel=a===o; inner+=`<span class="yn ${sel?'on':''}" data-q="${id}" data-val="${o}" style="display:inline-block;margin:6px 8px 0 0;cursor:pointer;padding:9px 22px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;${sel?'background:#fff;color:#13343b;font-weight:700;':''}">${o}</span>`; });
      break;
    }
    case 'services': {
      inner+='<div class="opts">';
      SVC_ROWS.forEach(r=>{
        const v=a[r.key]||'';
        inner+=`<div class="svc-row"><span class="svc-label">${escapeHtml(r.label)}</span><span class="svc-btns">
          <span class="yn ${v==='Yes'?'on':''}" data-q="${id}" data-row="${r.key}" data-val="Yes">Yes</span>
          <span class="yn ${v==='No'?'on':''}" data-q="${id}" data-row="${r.key}" data-val="No">No</span></span></div>`;
      });
      inner+='</div>';
      break;
    }
    case 'amount500': {
      const priv = (ans.Q33&&ans.Q33.choice)==='Communicated privately';
      if(!priv){
        inner+=`<div class="qhint">Q33 is not \u201CCommunicated privately\u201D, so this is automatically <b>N/A</b>.</div>`;
      } else {
        inner+=`<div class="field" style="display:flex;align-items:center;gap:10px;"><input class="num" data-q="${id}" data-amount="1" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0\u2013500" value="${escapeHtml(a.na?'':(a.amount||''))}" style="max-width:140px;"><span class="muted">ZAR</span></div>`;
        const sel=a.na;
        inner+=`<div class="opt single ${sel?'selected':''}" data-q="${id}" data-na="1"><span class="mark">${sel?'\u25CF':''}</span><span>Not applicable (declines to pay)</span></div>`;
        inner+=`<div class="qhint">Type an amount, or tap \u201CNot applicable\u201D. Tapping it again (or typing) re-enables the amount.</div>`;
      }
      break;
    }
    case 'prizeAB': {
      // handled by single-branch above? No — keep here for the conditional gate.
      const amt=ans.Q34&&!ans.Q34.na&&isNum(ans.Q34.amount)&&String(ans.Q34.amount).trim()!=='';
      if(!amt){
        inner+=`<div class="qhint">Answer only after a willingness-to-pay amount is stated in Q34.</div>`;
      } else {
        inner+='<div class="opts">';
        def.opts.forEach(o=>{ const sel=choice===o; inner+=`<div class="opt single ${sel?'selected':''}" data-q="${id}" data-val="${escapeHtml(o)}"><span class="mark">${sel?'\u25CF':''}</span><span>${escapeHtml(o)}</span></div>`; });
        inner+='</div>';
      }
      break;
    }
    case 'landuse': {
      inner+='<div style="margin:4px 0 8px;">';
      ['Yes','No'].forEach(o=>{ const sel=a.own===o; inner+=`<span class="yn ${sel?'on':''}" data-q="${id}" data-own="${o}" style="display:inline-block;margin:0 8px 0 0;cursor:pointer;padding:9px 22px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;${sel?'background:#fff;color:#13343b;font-weight:700;':''}">${o}</span>`; });
      inner+='</div>';
      if(a.own==='Yes'){
        inner+='<div class="qhint">How was land access obtained?</div><div class="opts">';
        LANDUSE_METHODS.forEach(m=>{ const sel=(a.methods||[]).includes(m); inner+=`<div class="opt multi ${sel?'selected':''}" data-q="${id}" data-method="${escapeHtml(m)}"><span class="mark">${sel?'\u2713':''}</span><span>${escapeHtml(m)}</span></div>`; });
        inner+='</div>';
        if((a.methods||[]).includes('Other')) inner+=`<div class="field"><input class="txt" data-q="${id}" data-luother="1" placeholder="Please specify" value="${escapeHtml(a.other||'')}"></div>`;
      } else if(a.own==='No'){
        inner+=`<div class="qhint">No land access \u2014 method options are not applicable.</div>`;
      }
      break;
    }
    case 'livedout': {
      inner+='<div style="margin:4px 0 8px;">';
      ['Yes','No'].forEach(o=>{ const sel=a.lived===o; inner+=`<span class="yn ${sel?'on':''}" data-q="${id}" data-lived="${o}" style="display:inline-block;margin:0 8px 0 0;cursor:pointer;padding:9px 22px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;${sel?'background:#fff;color:#13343b;font-weight:700;':''}">${o}</span>`; });
      inner+='</div>';
      if(a.lived==='Yes'){
        inner+=`<div class="field"><label>Where?</label><input class="txt" data-q="${id}" data-where="1" value="${escapeHtml(a.where||'')}"></div>`;
        inner+=`<div class="field"><label>Duration</label><input class="txt" data-q="${id}" data-duration="1" value="${escapeHtml(a.duration||'')}"></div>`;
      } else if(a.lived==='No'){
        inner+=`<div class="qhint">Where / Duration not applicable.</div>`;
      }
      break;
    }
  }
  inner+=`<div class="qerr" id="err-${id}"></div>`;
  inner+=`</div>`;
  return inner;
}
/* ---------- wire events for a section (delegation) ---------- */
function wireQuestions(sec, ans){
  const body=document.getElementById('qbody');
  // these triggers change conditional visibility => re-render the section
  const VISIBILITY_TRIGGERS = ['Q33','Q56'];
  body.querySelectorAll('.opt, .yn').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.q; if(!id) return;
      const def=Q[id]; const a=ans[id];
      // amount500 "Not applicable"
      if(el.dataset.na){ a.na=!a.na; if(a.na) a.amount=''; saveState(); rerenderSection(sec,ans); return; }
      // services grid
      if(el.dataset.row){ a[el.dataset.row]=el.dataset.val; saveState(); rerenderSection(sec,ans); return; }
      // land-use own
      if(el.dataset.own!==undefined && el.dataset.own!==''){ a.own=el.dataset.own; if(a.own!=='Yes'){a.methods=[];a.other='';} saveState(); rerenderSection(sec,ans); return; }
      // land-use method multi
      if(el.dataset.method){ const m=el.dataset.method; const i=a.methods.indexOf(m); if(i>=0)a.methods.splice(i,1); else a.methods.push(m); if(m==='Other'&&i>=0)a.other=''; saveState(); rerenderSection(sec,ans); return; }
      // lived-out yes/no
      if(el.dataset.lived!==undefined && el.dataset.lived!==''){ a.lived=el.dataset.lived; if(a.lived!=='Yes'){a.where='';a.duration='';} saveState(); rerenderSection(sec,ans); return; }
      // simple yes/no (Q53)
      if(def.t==='yesno' && el.dataset.val){ ans[id]=el.dataset.val; saveState(); rerenderSection(sec,ans); return; }
      // multi-select (Q5)
      if(def.t==='multi'){
        const o=el.dataset.val; const arr=ans[id]; const idx=arr.indexOf(o);
        if(idx>=0){ arr.splice(idx,1); }
        else {
          const excl=def.exclusive||[];
          if(excl.includes(o)){ ans[id]=[o]; }                 // exclusive clears others
          else { def.exclusive&&def.exclusive.forEach(e=>{ const j=arr.indexOf(e); if(j>=0)arr.splice(j,1); }); arr.push(o); }
        }
        saveState();
        // toggle classes in place (no visibility change)
        body.querySelectorAll(`.opt[data-q="${id}"]`).forEach(o2=>{
          const on=(ans[id]||[]).includes(o2.dataset.val);
          o2.classList.toggle('selected',on); o2.querySelector('.mark').textContent=on?'\u2713':'';
        });
        return;
      }
      // single-select family
      if(['freq','single','statement5','prizeAB'].includes(def.t)){
        const o=el.dataset.val;
        const obj=(typeof a==='object')?a:(ans[id]={choice:'',other:''});
        obj.choice = (obj.choice===o)?'':o;       // tap again to clear
        if(def.other && obj.choice!=='Other') obj.other='';
        saveState();
        if(VISIBILITY_TRIGGERS.includes(id) || def.other){ rerenderSection(sec,ans); }
        else {
          body.querySelectorAll(`.opt[data-q="${id}"]`).forEach(o2=>{
            const on=obj.choice===o2.dataset.val;
            o2.classList.toggle('selected',on); o2.querySelector('.mark').textContent=on?'\u25CF':'';
          });
        }
        return;
      }
    };
  });
  // ----- idlist tap-chips (Q8–Q15): build the stored string from taps -----
  body.querySelectorAll('.chip[data-chip]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.q, chip=el.dataset.chip;
      const cur=parseIdList(ans[id]);
      if(chip==='NA'){
        ans[id] = cur.na ? '' : 'N/A';
      } else if(chip==='CHIEF'){
        ans[id] = buildIdList(cur.ids, !cur.chief);
      } else {
        const arr=cur.ids.slice(); const i=arr.indexOf(chip);
        if(i>=0) arr.splice(i,1); else arr.push(chip);
        ans[id] = buildIdList(arr, cur.chief);
      }
      saveState();
      const np=parseIdList(ans[id]);
      body.querySelectorAll(`.chip[data-q="${id}"][data-chip]`).forEach(c=>{
        const ch=c.dataset.chip;
        const on = ch==='NA' ? np.na : (ch==='CHIEF' ? np.chief : np.ids.includes(ch));
        c.classList.toggle('on',on);
      });
      const card=document.getElementById('card-'+id); if(card) card.classList.remove('invalid');
      const err=document.getElementById('err-'+id); if(err) err.textContent='';
    };
  });
  // ----- Refused / Don't know skip toggle for number & text fields -----
  body.querySelectorAll('.chip[data-skip]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.q;
      ans[id] = isRefusedVal(ans[id]) ? '' : 'Refused';
      saveState(); rerenderSection(sec,ans);
    };
  });
  // text / number inputs (no section re-render, so focus is kept while typing)
  body.querySelectorAll('input[data-q]').forEach(el=>{
    if(el.disabled) return;
    const id=el.dataset.q; const def=Q[id]; const a=ans[id];
    el.oninput=()=>{
      if(el.dataset.amount){
        let v=el.value.replace(/[^0-9]/g,''); if(v!==el.value) el.value=v;
        a.amount=v; if(v!=='') a.na=false;
        const na=body.querySelector(`.opt[data-q="${id}"][data-na]`);
        if(na && !a.na){ na.classList.remove('selected'); const mk=na.querySelector('.mark'); if(mk) mk.textContent=''; }
        saveState(); return;
      }
      if(el.dataset.num){
        let v = def.intOnly ? el.value.replace(/[^0-9]/g,'') : el.value.replace(/[^0-9.]/g,'');
        if(v!==el.value) el.value=v;
        ans[id]=v; saveState(); updateNumWarn(id, ans); return;
      }
      if(el.dataset.other){ a.other=el.value; }
      else if(el.dataset.multiother){ ans[id+'__o']=el.value; }
      else if(el.dataset.luother){ a.other=el.value; }
      else if(el.dataset.where){ a.where=el.value; }
      else if(el.dataset.duration){ a.duration=el.value; }
      else { ans[id]=el.value; }
      saveState();
    };
  });
}
/* build a network-list string from selected IDs + chief flag */
function buildIdList(ids, chief){
  const parts=ids.slice(); if(chief) parts.push('CHIEF');
  return parts.join(' ');
}
/* inline out-of-range / eligibility warning for number fields */
function updateNumWarn(id, ans){
  const def=Q[id]; const el=document.getElementById('warn-'+id); if(!el) return;
  const v=ans[id]; el.textContent='';
  if(v===''||v==null||isRefusedVal(v)) return;
  if(!isNum(v)){ el.textContent='\u26A0 Not a number.'; return; }
  const n=Number(v);
  if(def.min!=null && n<def.min){ el.textContent='\u26A0 Below the expected minimum ('+def.min+').'; return; }
  if(def.max!=null && n>def.max){ el.textContent='\u26A0 Above the expected maximum ('+def.max+') \u2014 please confirm.'; return; }
  if(id==='Q38' && n<18){ el.textContent='\u26A0 Under 18 \u2014 confirm this participant is eligible to consent.'; }
}

        </div>
        <div class="qerr" id="eid-err"></div>

      <div class="field"><label>Session completed by (name)</label><input class="txt" id="cby" value="${escapeHtml((STATE.draft.completedBy)||STATE.setup.facilitatorName||'')}"></div>

  document.getElementById('edit').onclick=()=>go('section',{section:SECTIONS.length});
  app.querySelectorAll('.issue[data-sec]').forEach(el=>{ const sn=el.dataset.sec; if(sn) el.onclick=()=>go('section',{section:Number(sn)}); });

function answerSummary(id,ans){
  const def=Q[id]; const a=ans[id];
  switch(def.t){
    case 'multi': { const base=(a&&a.length)?a.join('; '):'\u2014'; const o=ans[id+'__o']; return (def.other&&a&&a.includes('Other')&&o)?(base+' ('+o+')'):base; }
    case 'services': return SVC_ROWS.map(r=>r.label.split(' ')[0]+':'+(a[r.key]||'\u2014')).join('  ');
    case 'amount500': return a.na?'N/A':(a.amount!==''?a.amount+' ZAR':'\u2014');
    case 'landuse': return a.own?(a.own+(a.own==='Yes'?(' \u2014 '+((a.methods||[]).join('; ')||'no method')+(a.other?(' ('+a.other+')'):'')):'')):'\u2014';
    case 'livedout': return a.lived?(a.lived+(a.lived==='Yes'?(' \u2014 '+(a.where||'?')+' / '+(a.duration||'?')):'')):'\u2014';
    case 'idself': return ans.Q7||'\u2014';
    case 'single': case 'statement5': case 'prizeAB':
      return (a.choice||'\u2014')+((def.other&&a.choice==='Other'&&a.other)?(': '+a.other):'');
    default: return (a==='' || a==null)?'\u2014':String(a);
  }
}

============================================================================= */
function csvCell(v){ if(v==null) return ''; const s=String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function buildCSV(){
  const s=STATE.setup;
  const meta=['village_number','run','village_name','village_type','ward_tc','date','facilitator','completed_by','participant_id','colour_member','saved_at'];
  const cols=[];
  ALL_IDS.forEach(id=>{
    const def=Q[id];
    if(def.t==='services'){ SVC_ROWS.forEach(r=>cols.push(id+'_'+r.key)); }
    else if(def.t==='amount500'){ cols.push(id+'_amount'); cols.push(id+'_na'); }
    else if(def.t==='landuse'){ cols.push(id+'_own'); cols.push(id+'_methods'); cols.push(id+'_other'); }
    else if(def.t==='livedout'){ cols.push(id+'_lived'); cols.push(id+'_where'); cols.push(id+'_duration'); }
    else if(def.t==='multi' && def.other){ cols.push(id); cols.push(id+'_other'); }
    else if((def.t==='single'||def.t==='statement5'||def.t==='prizeAB')&&def.other){ cols.push(id); cols.push(id+'_other'); }
    else cols.push(id);
  });
  const header=meta.concat(cols).join(',');
  const lines=[header];
  (STATE.surveys||[]).slice().sort((a,b)=>idOrder(a.id)-idOrder(b.id)).forEach(sv=>{
    const a=sv.answers;
    const vlg=(sv.village!=null)?sv.village:s.villageNumber;
    const run=(sv.run!=null)?sv.run:s.run;
    const pidFull=participantIdFull(vlg, run, sv.id);
    const row=[ vlg, run, s.villageName,s.villageType,s.wardTC,s.date,s.facilitatorName,sv.completedBy,pidFull,sv.id,sv.savedAt ];
    ALL_IDS.forEach(id=>{
      const def=Q[id]; const v=a[id];
      if(def.t==='services'){ SVC_ROWS.forEach(r=>row.push(v[r.key]||'')); }
      else if(def.t==='amount500'){ row.push(v.na?'':v.amount); row.push(v.na?'1':''); }
      else if(def.t==='landuse'){ row.push(v.own||''); row.push((v.methods||[]).join('; ')); row.push(v.other||''); }
      else if(def.t==='livedout'){ row.push(v.lived||''); row.push(v.where||''); row.push(v.duration||''); }
      else if(def.t==='multi'){ row.push((v||[]).join('; ')); if(def.other) row.push(a[id+'__o']||''); }
      else if((def.t==='single'||def.t==='statement5'||def.t==='prizeAB')){ row.push(v.choice||''); if(def.other) row.push(v.other||''); }
      else row.push(v==null?'':v);
    });
    lines.push(row.map(csvCell).join(','));
  });
  return lines.join('\n');
}

function buildChiefCSV(){
  // Get chief surveys, defensively
  const surveys = (STATE.chiefSurveys || []);
  if(!surveys.length) return '';

  // Meta columns always present
  const META = ['village_number','run','village_name','village_type','date','facilitator','saved_at'];

  // All CS question keys in definition order
  const CS_KEYS = Object.keys(CS);

  // Extra sub-keys produced by gate questions (stored in answers but not in CS keys)
  const EXTRA = ['B3_yn','B3_purpose','B3_org','B2_project','I3_yn','I3_where','I3_dur'];

  // Collect all B5_freq_* keys that appear in any survey
  const freqKeys = [];
  const freqSeen = new Set();
  surveys.forEach(sv => {
    Object.keys(sv.answers || {}).forEach(k => {
      if(k.startsWith('B5_freq_') && !freqSeen.has(k)){
        freqSeen.add(k); freqKeys.push(k);
      }
    });
  });
  freqKeys.sort();

  const allAnsCols = [...CS_KEYS, ...EXTRA, ...freqKeys];
  const header = [...META, ...allAnsCols];

  function cell(v){
    if(v == null || v === '') return '';
    // Arrays (multi-select stored as array) -> semicolon-joined quoted string
    if(Array.isArray(v)) return '"' + v.join('; ').replace(/"/g, '""') + '"';
    // H11 object {electricity:'Yes',...} -> "electricity:Yes; ..."
    if(typeof v === 'object') return '"' + Object.entries(v).map(([k2,v2])=>k2+':'+v2).join('; ').replace(/"/g,'""') + '"';
    const str = String(v).replace(/"/g, '""');
    return (str.includes(',') || str.includes('\n') || str.includes('"')) ? '"' + str + '"' : str;
  }

  const rows = [header.join(',')];
  surveys.forEach(sv => {
    const a = sv.answers || {};
    const metaVals = [sv.village||'', sv.run||1, sv.villageName||'', sv.villageType||'', sv.date||'', sv.facilitator||'', sv.savedAt||''];
    const ansVals  = allAnsCols.map(k => cell(a[k]));
    rows.push([...metaVals.map(cell), ...ansVals].join(','));
  });
  return rows.join('\n');
}

function dlBlob(filename, content){
  const blob = new Blob(['\ufeff' + content], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

    </div>`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('home2').onclick=()=>go('home');
  const cab=document.getElementById('ca'); if(cab) cab.onclick=()=>{ if(confirm('Clear all archived experiments?')){ saveSurveyArchive([]); go('pastExperiments'); } };
  app.querySelectorAll('[data-dl]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const exp=archive[Number(btn.dataset.dl)]; if(!exp) return;
      const blob=new Blob([exp.csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=exp.label+'.csv';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },1000);
    };
  });
}

function csBlankAnswers(){ const a={}; Object.keys(CS).forEach(k=>{a[k]=''; }); return a; }

function csGetSelArr(val){
  if(!val) return [];
  if(Array.isArray(val)) return val;
  return String(val).split('|').filter(Boolean);
}

/* Returns true if a chief survey answer is considered filled */
function csIsAnswered(k, ans){
  const def=CS[k]; if(!def) return true; // unknown key = don't block
  const val=ans[k];
  switch(def.t){
    case 'text':
      if(k==='I3') return !!(ans.I3_yn); // I3 stores answer in I3_yn, not ans.I3
      return val!=null && String(val).trim()!=='';
    case 'b3gate': return !!(ans.B3_yn);
    case 'single': return val!=null && val!=='';
    case 'multi': return csGetSelArr(val).length>0;
    case 'cs_services': {
      const svc=val||{};
      return ['electricity','piped_inside','piped_yard','communal_tap','flush_inside','flush_outside','pit_latrine','bucket'].every(k=>!!svc[k]);
    }
    case 'cs_number': return val!=null && String(val).trim()!=='';
    case 'b3gate': return (ans.B3_yn||'')!=='';
    default: return true;
  }
}

/* Returns list of unanswered REQUIRED question keys for a given section number.
   Optional questions (flagged by def.optional) and skipped questions are excluded. */
function csMissingRequired(secNum, ans){
  const sec=CS_SECTIONS.find(s=>s.n===secNum); if(!sec) return [];
  const missing=[];
  sec.keys.forEach(k=>{
    const def=CS[k]; if(!def||def.optional) return;
    const {show}=csIsVisible(k,ans);
    if(!show) return; // skipped — don't require
    // B3 gate sub-fields don't block (purpose/organiser are optional follow-up)
    if(k==='B3'){ if(!(ans.B3_yn||'')) missing.push(k); return; }
    // I2 (years) and I3 (lived outside) are important but non-blocking in enumerator flow
    if(k==='I2'||k==='I3') return;
    if(!csIsAnswered(k,ans)) missing.push(k);
  });
  return missing;
}
function csIsVisible(k, ans){
  switch(k){
    case 'E4a': {
      const sel=csGetSelArr(ans.E4);
      if(sel.length===1 && sel[0]==='No \u2014 everyone is included equally')
        return {show:false, skipNote:'Skip \u2014 E4 = \u201CNo, everyone is included equally\u201D'};
      if(sel.length===0) return {show:true, skipNote:'\u26A0 Ask only if E4 selected any specific group (not \u201CNo \u2014 everyone\u201D)'};
      return {show:true, skipNote:null};
    }
    case 'F4b':
      return ans.F4==='Yes' ? {show:true,skipNote:null} : {show:false,skipNote:'Skip \u2014 F4 \u2260 Yes'};
    case 'I5':
      if(ans.I4==='Never') return {show:false,skipNote:'Skip \u2014 I4 = Never (no travel to record reason for)'};
      if(!ans.I4) return {show:true,skipNote:'\u26A0 Ask only if I4 \u2260 Never'};
      return {show:true,skipNote:null};
    default:
      return {show:true,skipNote:null};
  }
}
function csB2RoleVisible(ans){ return csGetSelArr(ans.B2).includes('Yes'); }
function csH12SubVisible(ans){ return csGetSelArr(ans.H12).includes('Yes \u2014 owns / has rights'); }

        qHTML+=`<div class="qcard" id="qcard-H12">${banner}<div class="qtext"><b>H12</b> \u2014 Own or have right to use agricultural land?</div>${gateBtns}<div id="cs-sub-H12">${subHTML}</div><div class="qerr" id="csqerr-H12"></div></div>`;

      const f2note=(k==='F2')?`<div style="font-size:13px;color:#adf;background:rgba(100,150,255,0.12);border-radius:6px;padding:6px 8px;margin-bottom:6px;">\uD83D\uDCCB F2 Rank: after ticking selections, ask respondent to number them 1, 2, 3... (1 = most important). Record ranking in the \u201COther\u201D field below, e.g. \u201C1=Inkosi, 2=Imbizo\u201D. Ranking is optional \u2014 tick-only is acceptable if respondent declines.</div>`:'';

              return `<div class="field" style="margin-bottom:3px;"><label style="font-size:12px;opacity:0.8;">${escapeHtml(a)}</label><input data-cq="${fkey}" class="txt" value="${escapeHtml(ans[fkey]||'')}" placeholder="e.g. monthly, 3x/year"></div>`;

      qHTML+=`<div class="qcard" id="qcard-${k}">${banner}${f2note}${b5note}<div class="qtext"><b>${k}</b> \u2014 ${escapeHtml(def.text)}</div>${btns}${oth}${b5freqWrap}<div class="qerr" id="csqerr-${k}"></div></div>`;

  const isLast=secNum===CS_SECTIONS.length;

  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">\uD83C\uDFE0</button><span class="title">\uD83D\uDC51 Chief Survey</span><span class="step">${secNum}/${CS_SECTIONS.length}</span></div>
    <div class="progress"><div style="width:${pct}%"></div></div>

  /* ---- In-place sub-zone update helpers (avoid full re-render / scroll jump) ---- */

  function csSubB3HTML(a){
    const yn=a.B3_yn||'';
    if(yn==='Yes') return `
      <div class="field" style="margin-top:8px;"><label style="font-size:13px;opacity:0.85;">Purpose (what was the shared purpose?):</label>

        <input data-cq="B3_org" class="txt" value="${escapeHtml(a.B3_org||'')}" placeholder="e.g. inkosi, ward committee, women's group..."></div>`;

    return '';
  }

  function csSubI3HTML(a){
    if(a.I3_yn==='Yes') return `
      <div class="field" style="margin-top:8px;"><label style="font-size:13px;opacity:0.85;">Where?</label><input data-cq="I3_where" class="txt" value="${escapeHtml(a.I3_where||'')}" placeholder="Location"></div>
      <div class="field"><label style="font-size:13px;opacity:0.85;">Duration?</label><input data-cq="I3_dur" class="txt" value="${escapeHtml(a.I3_dur||'')}" placeholder="e.g. 2 years"></div>`;

  }

  function csSubB2HTML(a){
    const selArr=csGetSelArr(a.B2);

    const B2_ROLE_=['Initiated the idea','Called an imbizo','Mobilised collective labour (ilima)','Mobilised cash or materials','Contacted the ward councillor or municipality','Contacted a government department','Contacted an NGO or church','Monitored implementation','Resolved a dispute about the project'];
    let h=`<div style="margin-top:8px;font-size:13px;opacity:0.8;">If yes — what was your role? (Select all that apply)</div>`;
    h+=B2_ROLE_.map(o=>`<div class="opt multi ${selArr.includes(o)?'selected':''}" data-cq="B2" data-v="${escapeHtml(o)}" data-single="0"><span class="mark">${selArr.includes(o)?'✓':''}</span><span>${escapeHtml(o)}</span></div>`).join('');
    h+=`<div class="field" style="margin-top:4px;"><input data-cq-oth="B2" class="txt" placeholder="Other role: ___" value="${escapeHtml(a.B2__o||'')}"></div>`;
    h+=`<div class="field"><label style="font-size:13px;opacity:0.85;">Project description</label><input data-cq="B2_project" class="txt" value="${escapeHtml(a.B2_project||'')}" placeholder="Describe the project"></div>`;

  function csSubH12HTML(a){
    const h12sel=csGetSelArr(a.H12);
    const H12_SUB_=['Allocated by the inkosi / Traditional Council','Permission to Occupy (PTO)','Communal grazing \u2014 no individual allocation','Registered title deed','Inherited within the family'];
    if(!h12sel.includes('Yes \u2014 owns / has rights')) return h12sel.includes('No')?`<div style="font-size:12px;color:#ffdd88;margin-top:4px;">⏩ Skip land access sub-items — H12 = No</div>`:'';
    let h=`<div style="margin-top:8px;font-size:13px;opacity:0.8;">If yes — how was land access obtained? (Select all that apply)</div>`;
    h+=H12_SUB_.map(o=>`<div class="opt multi ${h12sel.includes(o)?'selected':''}" data-cq="H12" data-v="${escapeHtml(o)}" data-single="0"><span class="mark">${h12sel.includes(o)?'✓':''}</span><span>${escapeHtml(o)}</span></div>`).join('');
    h+=`<div class="field" style="margin-top:4px;"><input data-cq-oth="H12" class="txt" placeholder="Other: ___" value="${escapeHtml(a.H12__o||'')}"></div>`;
    h+=["Don't know","Refused"].map(o=>`<div class="opt multi ${h12sel.includes(o)?'selected':''}" data-cq="H12" data-v="${escapeHtml(o)}" data-single="0"><span class="mark">${h12sel.includes(o)?'✓':''}</span><span>${escapeHtml(o)}</span></div>`).join('');

  }

  function csSubB5FreqHTML(a){
    const FA=['Ward councillor','Local / District Municipality','DRDAR (Dept. of Rural Development & Agrarian Reform)','DWS (Dept. of Water & Sanitation)','Other provincial department','EC House of Traditional and Khoi-San Leaders','ANC branch / political party structure','NGO or community-based organisation','Church / faith organisation'];
    const curSel=csGetSelArr(a.B5);
    const visible=FA.filter(ag=>curSel.includes(ag));
    if(!visible.length) return '';
    return `<div style="margin-top:10px;border-top:1px solid rgba(255,255,255,0.15);padding-top:8px;font-size:13px;opacity:0.85;">Frequency for each selected agency:</div>`+
      visible.map(ag=>{
        const fk='B5_freq_'+ag.replace(/[^a-zA-Z0-9]/g,'_').substring(0,30);
        return `<div class="field" style="margin-bottom:3px;"><label style="font-size:12px;opacity:0.8;">${escapeHtml(ag)}</label><input data-cq="${fk}" class="txt" value="${escapeHtml(a[fk]||'')}" placeholder="e.g. monthly, 3x/year"></div>`;
      }).join('');

  /* Update a sub-zone div in-place without scrolling */
  function csUpdateSub(id, html){
    const el=document.getElementById(id); if(!el) return;
    el.innerHTML=html;
    // Re-wire any new inputs/opts inside the sub-zone
    el.querySelectorAll('input[data-cq]').forEach(inp=>{ inp.oninput=()=>{ ans[inp.dataset.cq]=inp.value; saveState(); }; });
    el.querySelectorAll('input[data-cq-oth]').forEach(inp=>{ inp.oninput=()=>{ ans[inp.dataset.cqOth+'__o']=inp.value; saveState(); }; });
    el.querySelectorAll('.opt[data-cq]').forEach(opt=>{
      opt.onclick=()=>{
        const q=opt.dataset.cq; const v=opt.dataset.v; const single=opt.dataset.single==='1';
        if(single){ ans[q]=v; saveState(); el.querySelectorAll(`[data-cq="${q}"][data-single="1"]`).forEach(x=>{x.classList.remove('selected');x.querySelector('.mark').textContent='';}); opt.classList.add('selected'); opt.querySelector('.mark').textContent='✓'; }
        else { let sel=Array.isArray(ans[q])?ans[q]:(ans[q]?String(ans[q]).split('|').filter(Boolean):[]); if(sel.includes(v)) sel=sel.filter(x=>x!==v); else sel.push(v); ans[q]=sel; saveState(); opt.classList.toggle('selected',sel.includes(v)); opt.querySelector('.mark').textContent=sel.includes(v)?'✓':''; if(q==='H12') csUpdateSub('cs-sub-H12',csSubH12HTML(ans)); if(q==='B2') csUpdateSub('cs-sub-B2',csSubB2HTML(ans)); if(q==='B5'){ const fz=document.getElementById('cs-freq-B5'); if(fz){fz.innerHTML=csSubB5FreqHTML(ans); fz.querySelectorAll('input[data-cq]').forEach(inp=>{inp.oninput=()=>{ans[inp.dataset.cq]=inp.value;saveState();};});} } }
      };
    });
  }

  /* Update skip/show state of a separate card (E4a, F4b, I5) */
  function csUpdateCardVisibility(k){
    const card=document.getElementById('qcard-'+k); if(!card) return;
    const {show,skipNote}=csIsVisible(k,ans);
    card.style.opacity=show?'':'0.35';
    card.style.pointerEvents=show?'':'none';
    const skipEl=card.querySelector('.cs-skip-note');
    if(skipEl) skipEl.textContent=show?'':(skipNote||'Skip');
    else if(!show){
      let sn=card.querySelector('.cs-skip-note');
      if(!sn){ sn=document.createElement('div'); sn.className='cs-skip-note'; sn.style.cssText='font-size:12px;color:#ffdd88;margin-top:4px;'; card.appendChild(sn); }
      sn.textContent='⏩ '+(skipNote||'Skip');
    }
  }

  // B3 gate
  app.querySelectorAll('[data-b3yn]').forEach(el=>{
    el.onclick=()=>{
      ans.B3_yn=el.dataset.b3yn; saveState();
      // Update gate button states in-place
      app.querySelectorAll('[data-b3yn]').forEach(b=>{
        b.classList.toggle('selected', b.dataset.b3yn===ans.B3_yn);
        b.querySelector('.mark').textContent=b.dataset.b3yn===ans.B3_yn?'✓':'';

      csUpdateSub('cs-sub-B3', csSubB3HTML(ans));

      const q=el.dataset.cqSvc; const row=el.dataset.row; const v=el.dataset.val;

      ans[q][row]=v; saveState();

      app.querySelectorAll(`[data-cq-svc="${q}"][data-row="${row}"]`).forEach(b=>b.classList.toggle('on',b.dataset.val===v));

  app.querySelectorAll('[data-i3yn]').forEach(el=>{

      ans.I3_yn=el.dataset.i3yn; saveState();

      app.querySelectorAll('[data-i3yn]').forEach(b=>{
        b.classList.toggle('selected', b.dataset.i3yn===ans.I3_yn);
        b.querySelector('.mark').textContent=b.dataset.i3yn===ans.I3_yn?'✓':'';
      });
      csUpdateSub('cs-sub-I3', csSubI3HTML(ans));
    };
  });

  app.querySelectorAll('[data-cq]').forEach(el=>{
    if(el.tagName==='TEXTAREA'){
      el.oninput=()=>{ ans[el.dataset.cq]=el.value; saveState(); };
    } else if(el.tagName==='INPUT'){
      el.oninput=()=>{ ans[el.dataset.cq]=el.value; saveState(); };
    } else {
      el.onclick=()=>{
        const q=el.dataset.cq; const v=el.dataset.v; const single=el.dataset.single==='1';
        if(single){
          ans[q]=v; saveState();
          app.querySelectorAll(`[data-cq="${q}"][data-single="1"]`).forEach(x=>{ x.classList.remove('selected'); x.querySelector('.mark').textContent=''; });
          el.classList.add('selected'); el.querySelector('.mark').textContent='\u2713';
          // Update dependent card visibility in-place
          if(q==='F4') csUpdateCardVisibility('F4b');
          if(q==='I4') csUpdateCardVisibility('I5');
        } else {
          let sel=Array.isArray(ans[q])?ans[q]:(ans[q]?String(ans[q]).split('|').filter(Boolean):[]);
          if(sel.includes(v)) sel=sel.filter(x=>x!==v); else sel.push(v);
          ans[q]=sel; saveState();
          el.classList.toggle('selected',sel.includes(v));
          el.querySelector('.mark').textContent=sel.includes(v)?'\u2713':'';
          // In-place sub-zone and visibility updates
          if(q==='B2') csUpdateSub('cs-sub-B2', csSubB2HTML(ans));
          if(q==='H12') csUpdateSub('cs-sub-H12', csSubH12HTML(ans));
          if(q==='B5'){ const fz=document.getElementById('cs-freq-B5'); if(fz){fz.innerHTML=csSubB5FreqHTML(ans); fz.querySelectorAll('input[data-cq]').forEach(inp=>{inp.oninput=()=>{ans[inp.dataset.cq]=inp.value;saveState();};});} }
          if(q==='E4') csUpdateCardVisibility('E4a');
        }
      };
    }
  });
  app.querySelectorAll('[data-cq-oth]').forEach(el=>{ el.oninput=()=>{ ans[el.dataset.cqOth+'__o']=el.value; saveState(); }; });

  const cprev=document.getElementById('cprev'); if(cprev) cprev.onclick=()=>go('chiefSurvey',{mode:'resume',sec:secNum-1});
  // Required field check helper
  function csHighlightMissing(missing){
    missing.forEach(k=>{
      const card=document.getElementById('qcard-'+k)||app.querySelector(`.qcard:has(#csqerr-${k})`);
      const err=document.getElementById('csqerr-'+k);
      if(err) err.textContent='Required — please answer this question.';
      if(card){ card.style.border='1.5px solid rgba(255,100,100,0.7)'; card.scrollIntoView({behavior:'smooth',block:'center'}); }
    });
  }
  const cnext=document.getElementById('cnext');
  if(cnext) cnext.onclick=()=>{
    if(secNum===7&&!draft.vignette_confirmed){ showToast('Please confirm the vignette was read aloud before continuing.'); return; }
    const missing=csMissingRequired(secNum,ans);
    if(missing.length>0){
      showToast('⚠ Please answer all required questions ('+missing.length+' remaining).');
      csHighlightMissing(missing); return;
    }
    draft.sec=secNum+1; saveState(); go('chiefSurvey',{mode:'resume',sec:secNum+1});
  };
  document.getElementById('chome').onclick=()=>{ draft.sec=secNum; saveState(); go('home'); };
  const csave=document.getElementById('csave');
  if(csave) csave.onclick=()=>{
    const missing=csMissingRequired(secNum,ans);
    if(missing.length>0){
      showToast('⚠ Please answer all required questions ('+missing.length+' remaining).');
      csHighlightMissing(missing); return;
    }
    const s=STATE.setup||{};
    const rec={village:s.villageNumber||'',run:s.run||1,villageName:s.villageName||'',villageType:s.villageType||'',date:s.date||'',facilitator:s.facilitatorName||'',savedAt:new Date().toISOString(),answers:Object.assign({},ans)};
    if(!STATE.chiefSurveys) STATE.chiefSurveys=[];
    STATE.chiefSurveys.push(rec);
    STATE.chiefDraft=null;
    saveState();
    showToast('Chief Survey saved!');
    go('home');
  };
}

/* =============================================================================
   STARTUP + back-button handling
============================================================================= */
window.addEventListener('load',()=>{
  try{ history.replaceState({route,routeArgs,survey:true},'',''); }catch(e){}
  try{ render(); }catch(e){ console.error('render error:',e); }
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
});
/* iOS-safe: any back gesture just re-seeds history and re-renders current screen.
   Never use beforeunload — it disables bfcache on iOS and causes full reloads. */
window.addEventListener('popstate',()=>{
  try{ history.pushState({route,routeArgs,survey:true},'',''); }catch(e){}
  try{ render(); }catch(e){}
});
</script>
